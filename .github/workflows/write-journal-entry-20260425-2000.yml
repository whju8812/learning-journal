name: Write Journal Entry (2026-04-25 20:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260425-2000.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-04-25","session_label":"20:00","tech_content":"**Microsoft Agent Governance Toolkit：AI 代理執行期安全防護的開源解決方案**\n\nMicrosoft 於 4 月初正式開源 Agent Governance Toolkit，這是首個針對自主 AI 代理提供完整執行期安全防護的工具包，覆蓋 OWASP Agentic AI Top 10 所有十項風險，包含提示詞注入（prompt injection）、工具濫用（tool abuse）、資料外洩及記憶體投毒。工具包核心是 Agent OS 政策引擎，在每個代理動作執行前以 <0.1ms p99 延遲完成攔截與審查，並透過 callback 與 middleware 方式整合 LangChain、CrewAI、Google ADK 等主流框架，無需改寫既有代理邏輯。隨著 2026 年 6 月科羅拉多 AI 法案及 8 月 EU AI Act 高風險義務相繼生效，AI 代理治理能力將從加分項目升級為合規必要條件，現在建立稽核追蹤與政策執行機制正當其時。\n\n**Netflix 近 400 個叢集的 RDS → Aurora 自動化遷移實戰**\n\nNetflix 技術部落格發布了其自動化 RDS PostgreSQL 遷移至 Aurora PostgreSQL 的完整架構分析，涵蓋近 400 個生產叢集，實現效能提升最高達 75%、成本降低 28%。技術核心採用 Aurora Read Replica 方式，以 WAL 持續同步，並在遷移前自動驗證複製槽健康、參數相容性與尖峰寫入吞吐量；對 CDC（Change Data Capture）工作負載，系統在協調 slot 狀態後才執行靜止與切換（cutover）。最關鍵的設計理念是「回滾為一等公民」——直到流量完全切換至 Aurora 前，原 RDS 執行個體保留為可信來源，切換失敗時只需更新 data access layer 路由設定即可還原，無需重新部署應用程式。\n\n**React Foundation 正式成立，React 19 Compiler 讓效能優化走向自動化**\n\nReact 於 2026 年 2 月在 Linux Foundation 旗下成立 React Foundation，Amazon、Meta、Microsoft、Vercel 等八家白金成員共同資助，確保 React 長期維護不受單一商業決策影響，技術方向由核心維護者獨立掌控。同期穩定推出的 React 19 Compiler 在建置階段靜態分析元件依賴圖，自動插入 memo 化邏輯，讓不必要的重新渲染減少約 25–40%，Server Components 初始渲染時間從約 2.4 秒縮短至 0.8 秒。開發者毋需手動撰寫 useMemo、useCallback 或 React.memo，Compiler 自動識別純函式與參考穩定的值，讓程式碼更簡潔同時效能更好。","tech_application":"**① 為 AI 代理專案加入 Agent Governance Toolkit 防護**\n\n適合對象：使用 LangChain、CrewAI 或自建 AI 代理框架的後端工程師，想在不重寫既有邏輯的前提下加入 prompt injection 防護、工具使用審計與合規紀錄（Python 3.10+）。\n\n```bash\n# 安裝核心套件\npip install agent-governance-toolkit\n# 或只安裝需要的模組\npip install agt-policy-engine agt-audit-trail\n```\n\n```python\nfrom agent_governance_toolkit import GovernanceCallbackHandler\nfrom langchain.agents import initialize_agent, AgentType\nfrom langchain_openai import ChatOpenAI\n\ngovernance = GovernanceCallbackHandler(\n    policy=\"strict\",\n    audit_log=\"./audit.jsonl\"\n)\n\nllm = ChatOpenAI(model=\"gpt-4o\")\nagent = initialize_agent(\n    tools=[...],\n    llm=llm,\n    agent=AgentType.OPENAI_FUNCTIONS,\n    callbacks=[governance]\n)\n```\n\n**② 在現有 React 專案啟用 React 19 Compiler**\n\n適合對象：使用 Next.js 或 Vite 的前端工程師，想自動消除多餘元件重渲染，無需逐一加入 useMemo 或 useCallback（需 Node.js 18+ 及 React 19）。\n\n```bash\nnpm install --save-dev babel-plugin-react-compiler eslint-plugin-react-compiler\n```\n\n```js\n// babel.config.js\nmodule.exports = {\n  plugins: [\n    [\"babel-plugin-react-compiler\", {\n      sources: (filename) => filename.includes(\"src/components\"),\n    }],\n  ],\n};\n```\n\n```bash\n# 執行相容性檢查，掃描既有 src 目錄\nnpx react-compiler-healthcheck --dir src\n```","learning_analysis":{"AI / 機器學習":{"summary":"Microsoft 開源 Agent Governance Toolkit，以 <0.1ms p99 延遲實現 OWASP Agentic AI Top 10 完整覆蓋，prompt injection、工具濫用與資料外洩防護已有標準化框架解法","items":["Agent Governance Toolkit 透過 callback/middleware 整合 LangChain、CrewAI、Google ADK，加入治理不需改寫既有代理邏輯","OWASP Agentic AI Top 10（2026）首次正式分類自主代理十大風險，包含目標劫持、工具濫用、身份濫用、記憶體投毒、級聯失敗","2026 年 6 月科羅拉多 AI 法案、8 月 EU AI Act 高風險義務即將生效，AI 代理合規治理成為工程必要實作，而非可選項目"]},"雲端與基礎架構":{"summary":"Netflix 發布近 400 個 RDS PostgreSQL 叢集自動遷移至 Aurora 的完整架構，效能最高提升 75%、成本降低 28%，展示企業規模資料庫遷移的自動化最佳實踐","items":["Aurora Read Replica 遷移法：以 WAL 持續同步為基礎，在 replication lag 趨近零時才進入受控靜止（quiescence）再執行 cutover","CDC 工作負載處理：暫停下游消費者、記錄 slot 位置後在 Aurora 重建對應 replication slot，確保 stream processor 不遺漏事件","「回滾為一等公民」設計原則：應用層透過 data access layer 路由解耦，切換異常時只需更新路由設定即可還原，不需重新部署"]},"前端開發":{"summary":"React Foundation 在 Linux Foundation 成立強化 React 生態長期穩定性，React 19 Compiler 將效能優化從手動 memo 化提升為建置期自動化，重渲染減少 25–40%","items":["React 19 Compiler 靜態分析元件依賴圖，自動插入 memo 化邏輯，Server Components 初始渲染從 2.4s 縮短至 0.8s","babel-plugin-react-compiler 支援漸進式導入（指定特定目錄），搭配 eslint-plugin-react-compiler 提前偵測不相容的寫法","npx react-compiler-healthcheck --dir src 可快速掃描既有程式碼相容性，建議在啟用 Compiler 前先執行"]},"後端 / 系統設計":{"summary":"Bluesky 4 月服務中斷的事後分析揭示 Go runtime 高負載連鎖故障機制：臨時端口耗盡引發 memcache 錯誤風暴、OS thread 暴增至 10 倍、GC 停頓加深負荷，形成難以中斷的死亡螺旋","items":["臨時端口耗盡（ephemeral port exhaustion）：Go 服務在單一 loopback IP 達到連接上限，解法是自訂 dialer 隨機選取多個 loopback IP 分散連接","錯誤觸發日誌風暴：每秒百萬次 memcache 錯誤引發同等規模 blocking write(2) 系統呼叫，Go runtime 將 OS thread 從 150 暴增至 1,500","Stop-the-World GC 加速崩潰：大量 OS thread 加劇 GC 停頓時間，請求堆積進一步觸發更多錯誤與日誌，形成負向回饋迴圈"]},"開發者工具 / DevOps":{"summary":"GitHub App 安裝 Token 即將換用新格式（長度約 520 字元，ghs_ 前綴不變），4/27 起分階段推送，務必在 6 月前確認正規表達式與長度驗證不受影響","items":["新 Token 仍以 ghs_ 開頭，但長度增至約 520 字元（根據 payload 大小略有浮動），基於固定長度的 token 驗證邏輯須提前更新","影響範圍：GitHub Actions GITHUB_TOKEN、Dependabot、Slack/Teams 整合等首方應用於 4/27 起進入分階段推送","因應步驟：在 GitHub App 設定頁申請測試用新格式 Token，對現有正規表達式、長度檢查、儲存欄位定義進行相容性測試後再上線"]}},"sources":[{"title":"Introducing the Agent Governance Toolkit: Open-source runtime security for AI agents - Microsoft Open Source Blog","url":"https://opensource.microsoft.com/blog/2026/04/02/introducing-the-agent-governance-toolkit-open-source-runtime-security-for-ai-agents/"},{"title":"microsoft/agent-governance-toolkit - GitHub","url":"https://github.com/microsoft/agent-governance-toolkit"},{"title":"Automating RDS Postgres to Aurora Postgres Migration - Netflix TechBlog","url":"https://netflixtechblog.com/automating-rds-postgres-to-aurora-postgres-migration-261ca045447f"},{"title":"The React Foundation: A New Home for React Hosted by the Linux Foundation","url":"https://react.dev/blog/2026/02/24/the-react-foundation"},{"title":"React Fundamentals in 2026: Components, Hooks, React Compiler, and Modern UI Development - NuCamp","url":"https://www.nucamp.co/blog/react-fundamentals-in-2026-components-hooks-react-compiler-and-modern-ui-development"},{"title":"Bluesky Service Interruption April 2026 - Bluesky Blog","url":"https://bsky.social/about/blog/04-16-2026-bluesky-service-interruption"},{"title":"Notice about upcoming new format for GitHub App installation tokens - GitHub Changelog","url":"https://github.blog/changelog/2026-04-24-notice-about-upcoming-new-format-for-github-app-installation-tokens/"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
