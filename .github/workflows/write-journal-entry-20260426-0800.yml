  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date": "2026-04-26", "session_label": "08:00", "tech_content": "**GitHub Copilot Autopilot 進入公開預覽，自主代理模式改變開發流程**\n\nGitHub Copilot 在 VS Code 中推出 Autopilot 自主代理模式（公開預覽），允許開發者讓 Copilot 在無需逐步確認的情況下完成多步驟任務。傳統上，AI 程式碼助手每執行一個操作就需要開發者確認，在複雜任務中造成大量摩擦；Autopilot 模式解決了這個問題，讓代理能自動核准操作、在錯誤時自動重試，並持續工作直到任務完成。VS Code 的 Sessions 視圖讓開發者可同時監控多個並行代理 session，涵蓋本機、背景及雲端執行的任務。了解如何配置 Permission Level（從每步確認到完全自主）對兼顧效率與安全性至關重要，且這項能力正在快速成為日常 AI 開發工作流程的核心。\n\n**Temporal 工作流程引擎解決分散式系統的可靠性難題**\n\nTemporal 是一個耐久執行（Durable Execution）平台，讓開發者撰寫看起來像普通函數的工作流程代碼，由平台自動處理狀態持久化、重試邏輯及故障恢復，無需手寫狀態機或管理訊息佇列。在微服務架構中，跨服務的分散式交易是最棘手的工程問題之一；Temporal 透過 Saga 模式讓補償操作（如退款、釋放庫存）在任意步驟失敗時按反向順序自動執行，免去兩階段提交（Two-Phase Commit）的複雜性。Temporal 架構由四個內部服務組成：Frontend（API 閘道）、History（持久化事件儲存）、Matching（任務佇列管理）與 Worker（執行業務邏輯），分層設計確保高可用性。2026 年分散式系統複雜度持續攀升，掌握 Temporal 已成為後端工程師處理長時間運行業務流程的關鍵工具。\n\n**GitHub Actions 強化安全性：OIDC 自訂屬性聲明與 Azure VNET 容錯移轉**\n\nGitHub Actions 本月推出兩項重要安全更新。首先，OIDC 令牌現已支援儲存庫自訂屬性（Repository Custom Properties）作為聲明（Claims），讓雲端供應商可在信任政策中加入更細緻的屬性型存取控制（ABAC），例如依 business_unit 或 environment_tier 等自訂欄位授予不同的雲端資源存取權限，大幅降低 IAM 政策的管理複雜度。其次，Azure 私有網路的 GitHub 託管執行器現支援容錯移轉網路（公開預覽），可設定次要 Azure 子網路（可跨區域），確保主要子網路故障時工作流程仍能持續執行，可手動或在區域中斷時自動觸發。這兩項更新對企業環境中採用 GitHub Actions 的團隊至關重要，有效提升 CI/CD 流水線的安全性與可用性。", "tech_application": "**① GitHub Copilot Autopilot：讓 AI 代理自主完成複雜重構任務**\n\n適合對象：日常使用 VS Code 的開發者，尤其是需要跨多個檔案進行重構、補齊測試或生成文件的場景。開啟 VS Code 聊天視圖（⌃⌘I / Ctrl+Alt+I），輸入任務描述後按 Shift+Tab 切換至 Autopilot 模式：\n\n```\n# 在 VS Code 聊天視圖輸入任務描述，例如：\n# 將 src/services/ 下所有 callback 風格函數重構為 async/await 並補充單元測試\n#\n# 然後按 Shift+Tab 切換至 Autopilot 模式\n# Copilot 將自動執行所有步驟，無需逐一確認\n```\n\n在 Permissions Picker 中可選擇代理的自主程度，從「每個操作都需確認」到「完全自主執行」。建議首次使用時保留部分確認步驟，熟悉代理行為後再逐步開放完全自主模式。\n\n**② Temporal：一行指令在本機啟動耐久工作流程引擎**\n\n適合對象：後端工程師，需要在微服務架構中可靠地處理長時間運行的業務流程（訂單處理、付款、通知等），或需要自動重試與補償邏輯的跨服務分散式交易。\n\n```bash\n# 安裝 Temporal CLI（macOS）\nbrew install temporal\n\n# 啟動本機開發伺服器（Web UI 在 http://localhost:8233，gRPC 在 localhost:7233）\ntemporal server start-dev\n\n# 安裝 Python SDK\npip install temporalio\n```\n\n定義最簡單的 Workflow 與 Activity：\n\n```python\nfrom temporalio import workflow, activity\nfrom datetime import timedelta\n\n@activity.defn\nasync def charge_payment(amount: float) -> str:\n    # 實際業務邏輯，失敗時 Temporal 自動重試\n    return f\"已完成扣款：{amount} 元\"\n\n@workflow.defn\nclass OrderWorkflow:\n    @workflow.run\n    async def run(self, order_id: str) -> str:\n        return await workflow.execute_activity(\n            charge_payment,\n            10.0,\n            schedule_to_close_timeout=timedelta(seconds=30),\n        )\n```\n\n透過 `temporal server start-dev` 即可在本機完整體驗工作流程追蹤、自動重試及狀態持久化，無需預先建置完整的分散式環境。", "learning_analysis": {"AI / 機器學習": {"summary": "GitHub Copilot Autopilot 進入公開預覽，AI 代理自主開發進入實用階段，標誌著 AI 助手從建議者角色正式進化為自主執行者角色。", "items": ["GitHub Copilot Autopilot 自主代理模式（公開預覽）：無需逐步確認即可完成多步驟任務，並自動重試失敗操作", "多個代理 Session 並行執行：Sessions 視圖統一監控本機、背景與雲端代理任務的狀態", "代理 Permission Level 設計：從逐步確認到完全自主的漸進式授權模型，讓開發者掌握控制權與效率的平衡"]}, "雲端與基礎架構": {"summary": "GitHub Actions 強化雲端整合安全性，OIDC ABAC 支援與 Azure VNET 容錯移轉兩項更新讓企業 CI/CD 的安全性與可用性大幅提升。", "items": ["OIDC 令牌支援 Repository Custom Properties 作為聲明：實現基於屬性的細粒度雲端資源存取控制（ABAC）", "Azure VNET 容錯移轉（公開預覽）：次要子網路跨區域容錯，確保 CI/CD 在主要子網路故障時仍可持續執行", "GitHub-hosted runners 企業私有網路整合：支援手動觸發或區域中斷時自動容錯移轉的雙重機制"]}, "前端開發": {"summary": "前端生態系在 2026 年持續聚焦 AI 輔助開發工具整合，VS Code 代理式功能讓組件重構、測試生成與文件補齊等重複性工作流程受益最大。", "items": ["VS Code Copilot 代理模式支援跨多檔案的前端重構任務自動化執行", "Browser-based debugging 整合進 Copilot agent session：可在代理工作流程中直接偵錯前端渲染問題", "建議複習：Web Components 標準與框架無關的組件設計，提升 AI 自動重構的可預測性與安全性"]}, "後端 / 系統設計": {"summary": "Temporal 作為耐久執行平台在 2026 年已成為分散式系統可靠性設計的主流選擇，Saga 模式的實現讓跨微服務交易管理大幅簡化。", "items": ["Temporal Durable Execution：工作流程代碼自動獲得狀態持久化與重試能力，無需手寫狀態機或管理訊息佇列", "Saga 補償模式實作：跨微服務交易任意步驟失敗時，按反向順序自動執行補償操作，取代兩階段提交", "Temporal 四層架構：Frontend、History、Matching、Worker 分層設計，各層獨立擴展確保高可用性"]}, "開發者工具 / DevOps": {"summary": "GitHub Actions 持續推進企業級安全功能，同時 Temporal CLI 的本機開發體驗大幅降低分散式工作流程引擎的入門門檻。", "items": ["GitHub Actions 工作流程限制 50 次重跑：強制良好的工作流程設計，避免無限重試反模式造成資源浪費", "Temporal CLI `temporal server start-dev`：一行指令啟動含 Web UI 的完整本機開發環境，立即上手體驗", "2026 CI/CD 智能化趨勢：先進 DevOps 團隊將異常偵測與自動解決能力直接嵌入流水線，實現自主式流水線"]}}, "sources": [{"title": "GitHub Copilot in VS Code, March Releases - GitHub Changelog", "url": "https://github.blog/changelog/2026-04-08-github-copilot-in-visual-studio-code-march-releases/"}, {"title": "GitHub Actions: Early April 2026 updates - GitHub Changelog", "url": "https://github.blog/changelog/2026-04-02-github-actions-early-april-2026-updates/"}, {"title": "Actions OIDC tokens now support repository custom properties - GitHub Changelog", "url": "https://github.blog/changelog/2026-03-12-actions-oidc-tokens-now-support-repository-custom-properties/"}, {"title": "Allowing GitHub Copilot CLI to work autonomously - GitHub Docs", "url": "https://docs.github.com/en/copilot/concepts/agents/copilot-cli/autopilot"}, {"title": "Using agents in Visual Studio Code", "url": "https://code.visualstudio.com/docs/copilot/agents/overview"}, {"title": "Temporal Workflow Engine: The Reliability Layer Your Distributed System Is Missing [2026 Guide]", "url": "https://dev.to/kunal_d6a8fea2309e1571ee7/temporal-workflow-engine-the-reliability-layer-your-distributed-system-is-missing-2026-guide-1ia9"}, {"title": "How to Run Temporal in Docker for Workflow Orchestration", "url": "https://oneuptime.com/blog/post/2026-02-08-how-to-run-temporal-in-docker-for-workflow-orchestration/view"}, {"title": "Temporal: Revolutionizing Workflow Orchestration in Microservices Architectures", "url": "https://medium.com/@surajsub_68985/temporal-revolutionizing-workflow-orchestration-in-microservices-architectures-f8265afa4dc0"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
