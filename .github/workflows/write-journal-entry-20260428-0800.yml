name: Write Journal Entry (2026-04-28 08:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260428-0800.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date": "2026-04-28", "session_label": "08:00", "tech_content": "**Gemma 4：Google 最強開源模型，一行指令即可本地推理**\n\nGoogle DeepMind 於 2026 年 4 月發布 Gemma 4（Apache 2.0 授權），提供四種規格：E2B（2B 參數，適合手機）、E4B（4B，適合邊緣裝置）、26B MoE（僅激活 3.8B 參數，適合消費級 GPU）、以及 31B Dense（適合工作站）。全系列支援多模態輸入（文字、圖片、影片）、256K token 長文脈與 140 種以上語言。最具實用價值的是 26B MoE 版本，以 4-bit 量化僅需 18GB VRAM 即可流暢運行，透過 Ollama 一行指令 `ollama run gemma4` 就能在本地啟動與 OpenAI API 相容的推理端點。對需要在私有伺服器或本地環境進行 LLM 推理的開發者而言，Gemma 4 是目前效能與成本均衡最佳的開源選擇。\n\n**Microsoft Agent Framework 1.0：Semantic Kernel 與 AutoGen 合而為一**\n\nMicrosoft 於 4 月 3 日正式發布 Agent Framework 1.0，將分散於 Semantic Kernel 與 AutoGen 的功能整合為單一生產可用框架，同時支援 Python 與 .NET，並提供長期穩定 API 承諾。框架內建支援 MCP（Model Context Protocol）與 A2A（Agent-to-Agent）兩種協議，讓不同 agent 之間可直接互相呼叫與工具共享，不需自行設計通訊層。Python 安裝只需 `pip install agent-framework`，官方文件聲稱從安裝到第一個可運行 agent 不超過 5 分鐘。對正在評估 AI agent 開發框架的後端工程師而言，統一的 1.0 GA 版本大幅降低了選型與長期維護的風險。\n\n**GitHub Copilot 6 月起全面切換 AI Credits 計費，code review 將額外消耗 Actions 分鐘**\n\nGitHub 宣布自 2026 年 6 月 1 日起，Copilot 所有功能（包含 code review、chat、cloud agent）將統一改為以 AI Credits 計費，取代現行的 PRU（Premium Request Units）制度。最需關注的是 Copilot code review：在私有 repo 上的每次 review 除了消耗 AI Credits，還會額外扣除帳號的 GitHub Actions 執行分鐘數，超出方案額度後依標準 Actions 費率計費。GitHub 建議在 6 月前設定 spending limits 並盤點 CI 流程中的 Copilot 使用習慣；大量依賴 Copilot code review 的自動化 CI workflow 需特別留意可能增加的費用。", "tech_application": "**① 使用 Ollama 在本地運行 Gemma 4 並建立 OpenAI 相容 API 端點**\n\n適合對象：需要在私有環境進行 LLM 推理、或想以本地模型替換 OpenAI API 呼叫的後端工程師。Ollama 提供 OpenAI 相容的推理伺服器，搭配 Gemma 4 可立即啟用。\n\n```bash\n# 安裝 Ollama（macOS/Linux）\ncurl -fsSL https://ollama.ai/install.sh | sh\n\n# 啟動 Gemma 4（26B MoE，需 18GB VRAM）\nollama run gemma4\n\n# 較小版本（4B，約需 5GB RAM，可在 CPU 運行）\nollama run gemma4:4b\n```\n\nOllama 啟動後自動在 http://localhost:11434 提供 OpenAI 相容端點，可用 Python requests 測試：\n\n```python\nimport requests\nresp = requests.post(\n    \"http://localhost:11434/v1/chat/completions\",\n    json={\"model\": \"gemma4\", \"messages\": [{\"role\": \"user\", \"content\": \"你好\"}]}\n)\nprint(resp.json()[\"choices\"][0][\"message\"][\"content\"])\n```\n\n**② 在 GitHub Copilot 計費模式變更前查詢用量並設定 spending limit**\n\n適合對象：使用 GitHub Copilot 的個人開發者或組織管理員，需在 6 月 1 日前了解並管理使用量，避免計費模式切換後費用超支。\n\n```bash\n# 查詢個人帳號的 Copilot 近期使用量（需安裝 GitHub CLI）\ngh api /user/copilot/usage\n\n# 查詢組織層級的 Copilot 使用量（需 admin 權限，將 ORG 替換為組織名稱）\ngh api /orgs/ORG/copilot/usage\n```\n\n查詢後至 GitHub 個人設定 > Billing and plans > Spending limits，為 Copilot 設定月度費用上限，建議初始設為目前實際用量的 1.5 倍作為緩衝，確保 6 月轉制後帳單不超出預期。", "learning_analysis": {"AI / 機器學習": {"summary": "Gemma 4 帶來效能卓越的開源多模態模型，搭配 Ollama 一行指令即可本地部署；Microsoft Agent Framework 1.0 統一了 Semantic Kernel 與 AutoGen，使 AI agent 開發正式進入穩定生產階段。", "items": ["Gemma 4 26B MoE：以 4-bit 量化僅需 18GB VRAM，ollama run gemma4 即可在本地啟動推理端點", "Gemma 4 採用 Apache 2.0 授權，可商業使用，全系列支援 256K token 長文脈與多模態輸入", "Microsoft Agent Framework 1.0 GA：原生支援 MCP 與 A2A 協議，Python 與 .NET 雙語言支援", "pip install agent-framework 即可安裝，官方 Learn 文件提供 5 分鐘上手教程"]}, "雲端與基礎架構": {"summary": "Gemma 4 支援在 GKE 搭配 vLLM 進行可水平擴展的推理部署；GitHub Copilot 計費模式轉型提醒工程師重新審視 AI 工具的雲端成本管理策略，6 月前設定 spending limits 是當務之急。", "items": ["Gemma 4 可部署於 GKE + vLLM，支援從零動態擴展推理負載，亦可用 Cloud Run 無伺服器 GPU 運行", "GitHub Copilot 6 月起改 AI Credits 計費，建議提前至 Billing 設定 spending limits", "Copilot cloud agent 透過 Actions custom images 啟動速度提升 20%"]}, "前端開發": {"summary": "前端框架本週無重大版本釋出，Cursor 3 新增的 Design Mode 值得前端工程師關注——可直接點選 UI 元素並用自然語言描述修改，AI agent 自動生成對應程式碼。推薦複習 CSS Container Queries，這是實現元件自適應版型的現代標準。", "items": ["Cursor 3 Design Mode：點選 UI 元素並用自然語言描述修改，agent 自動實作，可加速前端迭代", "CSS Container Queries：比 Media Queries 更精確的響應式設計工具，值得複習其與 Grid Layout 的搭配用法"]}, "後端 / 系統設計": {"summary": "Microsoft Agent Framework 1.0 引入 A2A 協議，為後端服務提供標準化的多 agent 互呼叫機制；Modular Monolith 架構模式持續被推薦為多數新專案的最佳起點，享有微服務好處的同時大幅降低運維複雜度。", "items": ["Agent Framework 的 A2A 協議讓多個後端 agent 可直接互相呼叫，無需自訂通訊層", "Modular Monolith：享有微服務 80% 好處，卻只有 20% 的運維複雜度，適合大多數新專案", "後端架構選擇原則：先解決當前問題，根據實際瓶頸再引入複雜度，避免過早最佳化"]}, "開發者工具 / DevOps": {"summary": "GitHub Copilot 從 6 月 1 日起全面轉為 AI Credits 使用量計費，Copilot code review 在私有 repo 還會額外消耗 Actions 分鐘，開發者需提前審視 CI 流程中的 Copilot 使用策略並設定費用上限。", "items": ["Copilot 全功能改 AI Credits 計費，包括 chat、code review、cloud agent，取代現行 PRU 制度", "私有 repo 的 Copilot code review 每次額外消耗 GitHub Actions 執行分鐘，超出方案額度依標準費率計費", "建議 6 月前至 GitHub > Billing and plans > Spending limits 設定月度費用上限", "用 gh api /user/copilot/usage 查詢個人目前的 Copilot 使用量作為設定基準"]}}, "sources": [{"title": "Gemma 4: Byte for byte, the most capable open models - Google Blog", "url": "https://blog.google/innovation-and-ai/technology/developers-tools/gemma-4/"}, {"title": "Gemma 4 available on Google Cloud", "url": "https://cloud.google.com/blog/products/ai-machine-learning/gemma-4-available-on-google-cloud"}, {"title": "Gemma 4 Local Setup Guide - Run with Ollama + Open WebUI", "url": "https://effloow.com/articles/gemma-4-local-setup-ollama-open-webui-guide-2026"}, {"title": "Microsoft Agent Framework Version 1.0", "url": "https://devblogs.microsoft.com/agent-framework/microsoft-agent-framework-version-1-0/"}, {"title": "Microsoft Ships Production-Ready Agent Framework 1.0 for .NET and Python", "url": "https://visualstudiomagazine.com/articles/2026/04/06/microsoft-ships-production-ready-agent-framework-1-0-for-net-and-python.aspx"}, {"title": "GitHub Copilot code review will start consuming GitHub Actions minutes on June 1, 2026", "url": "https://github.blog/changelog/2026-04-27-github-copilot-code-review-will-start-consuming-github-actions-minutes-on-june-1-2026/"}, {"title": "GitHub Copilot is moving to usage-based billing", "url": "https://github.blog/news-insights/company-news/github-copilot-is-moving-to-usage-based-billing/"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
