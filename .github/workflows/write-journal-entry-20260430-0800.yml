name: Write Journal Entry (2026-04-30 08:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260430-0800.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-04-30","session_label":"08:00","tech_content":"**Google ADK：開源多智能體開發套件的工程實踐**\n\nGoogle Agent Development Kit（ADK）是 2026 年備受關注的開源 Python 框架，專為本地開發和部署 AI Agent 而設計。過去開發者測試多智能體工作流時必須依賴雲端服務，耗時且難以除錯；ADK 提供本地開發伺服器（`adk web`），讓工程師直接在瀏覽器聊天介面中調試 Agent 行為。其核心設計哲學是「工具即函數」：任何 Python 函數都可宣告為 Agent 工具，ADK 自動推斷工具描述；Runner 組件負責執行循環，讓開發者只需專注業務邏輯。ADK 支援多 Agent 協作、多模型混用，並與 Google Cloud Vertex AI 深度整合，是從原型到生產環境的完整路徑。\n\n**FastAPI 在 AI 後端服務的非同步優勢**\n\n2026 年基準測試顯示 FastAPI 吞吐量達 18,000–20,000 req/s，是同配置 Flask（Gunicorn 約 4,000 req/s）的五至七倍。關鍵差異在於底層架構：Flask 基於 WSGI（同步阻塞），FastAPI 基於 ASGI（非同步非阻塞），讓單一進程能同時處理多個 I/O 等待（如同時呼叫 LLM API 與向量資料庫）。在 AI 應用場景中，每次請求往往需要並行呼叫多個外部服務，FastAPI 搭配 asyncio.gather() 可將多個阻塞操作並行化，大幅縮短端對端延遲。Pydantic v2 整合進一步提供自動 OpenAPI 文件生成與型別驗證，減少大量樣板程式碼，是 2026 年新建 AI 後端服務的首選框架。\n\n**DeepSeek V4 Preview 與 4 月開源大模型競爭格局**\n\nDeepSeek 於 4 月 24 日發布 V4 系列預覽，引入混合注意力架構（Hybrid Attention Architecture），在百萬 token 上下文中顯著改善長序列記憶問題，並在 SWE-Bench Pro 程式碼基準測試上取得亮眼成績。同月，Meta Llama 4、Google Gemma 4（Apache 2.0）與智譜 GLM-5.1（744B MoE、MIT 授權）密集發布，開源大模型在多數基準上已追上商業模型。對開發者而言，這意味著可透過 Meta Llama Stack 或 Ollama 在本地或私有雲部署媲美商業品質的模型，在降低推論成本的同時保留資料主權。","tech_application":"**① 使用 Google ADK 建立你的第一個 AI Agent**\n\n適合想從零建立 AI Agent 工作流的後端開發者或 ML 工程師。ADK 以 Python 函數定義工具，以 Agent 類定義智能體，邏輯清晰且可本地調試。\n\n```bash\npip install google-adk\nadk create my_agent\ncd my_agent\nadk web\n```\n\n在 `agent.py` 中定義工具與 Agent：\n\n```python\nfrom google.adk.agents import Agent\n\ndef search_web(query: str) -> str:\n    \"\"\"搜尋網路並回傳結果\"\"\"\n    return f\"搜尋結果：{query}\"\n\nroot_agent = Agent(\n    name=\"my_agent\",\n    model=\"gemini-2.0-flash\",\n    tools=[search_web],\n    instruction=\"你是技術研究助理，協助搜尋並彙整技術資訊。\",\n)\n```\n\n執行 `adk web` 後開啟 http://localhost:8000 即可在瀏覽器中測試 Agent 對話。\n\n**② 將 Flask 同步路由遷移至 FastAPI 以支援 AI 並發請求**\n\n適合已有 Flask API 且面臨高並發壓力的後端工程師，特別是 API 需同時呼叫多個外部 AI 服務的場景。\n\n```bash\npip install fastapi uvicorn\n```\n\n原 Flask 同步路由（每次請求序列執行，LLM 呼叫阻塞後續操作）：\n\n```python\n# Flask 同步版本\n@app.route(\"/analyze\", methods=[\"POST\"])\ndef analyze():\n    result = call_llm(request.json[\"text\"])  # 阻塞等待\n    return jsonify(result)\n```\n\n遷移至 FastAPI 非同步（LLM 與向量搜尋並行執行）：\n\n```python\nfrom fastapi import FastAPI\nimport asyncio\n\napp = FastAPI()\n\n@app.post(\"/analyze\")\nasync def analyze(body: dict):\n    llm_result, context = await asyncio.gather(\n        call_llm_async(body[\"text\"]),\n        search_vectors_async(body[\"text\"]),\n    )\n    return {\"result\": llm_result, \"context\": context}\n```\n\n```bash\nuvicorn main:app --reload --workers 4\n```","learning_analysis":{"AI / 機器學習":{"summary":"Google ADK 開源多智能體框架進入生產就緒階段，DeepSeek V4 Preview 與多款開源大模型密集發布，開源 LLM 在程式碼基準上已追上商業模型水準。","items":["Google ADK（Agent Development Kit）提供本地開發伺服器與多智能體協作支援，是 2026 年建立 AI Agent 的標準框架之一","DeepSeek V4 引入混合注意力架構，百萬 token 上下文、SWE-Bench Pro 程式碼能力顯著提升","Meta Llama 4、Google Gemma 4、智譜 GLM-5.1（744B MoE）同月發布，開源模型版圖大幅擴張","Meta Llama Stack 提供統一部署框架，支援 AWS、GCP、Azure 等多雲推論路徑"]},"雲端與基礎架構":{"summary":"Meta Llama Stack 成為多雲 AI 推論的統一介面，Red Hat 與 Meta 合作將 vLLM 整合為企業級 Llama 4 部署標準，開源 AI 在私有雲場景的可行性持續提升。","items":["Meta Llama Stack 搭配 25 個雲端夥伴（AWS、GCP、Azure、Databricks 等），提供一致的推論 API 介面","Red Hat 與 Meta 合作，以 vLLM 作為 Llama 4 在企業環境的推論伺服器","自建私有雲 AI 推論可透過 Ollama 或 llama-stack 在本機或 GPU 伺服器部署開源模型，降低對商業 API 的依賴"]},"前端開發":{"summary":"2026 年前端工具鏈以 AI-first 開發環境為趨勢主軸，Bolt.new、v0、Cursor 等工具讓設計師也能直接產出可部署的前端應用；Next.js 與 Nuxt 仍是專業前端專案的主流框架。","items":["AI 輔助前端工具（v0、Bolt.new）可自動建立檔案結構、安裝相依套件並部署至 edge，大幅降低原型製作門檻","Next.js 在 2026 年持續演進，整合路由、資料擷取、快取、渲染策略與 API 層，是一站式解決方案","複習推薦：React Server Components 的渲染流程與 hydration 機制，是理解現代 Next.js 的基礎"]},"後端 / 系統設計":{"summary":"FastAPI 在 AI 後端服務場景的性能優勢在 2026 年更為明顯，非同步架構是處理多 LLM 並行呼叫的關鍵；Pydantic v2 提供型別安全與自動文件生成，成為 AI API 開發標準配置。","items":["FastAPI 基於 ASGI 非同步架構，吞吐量達 18,000–20,000 req/s，是 Flask 的五至七倍，在 I/O 密集型 AI 服務場景優勢明顯","asyncio.gather() 可將多個 LLM 呼叫、向量搜尋等操作並行化，顯著降低端對端延遲","Pydantic v2 整合提供自動 OpenAPI 文件生成、輸入驗證與序列化，減少 AI API 樣板程式碼","Flask 遷移至 FastAPI 的核心步驟：同步函數改為 async def，Gunicorn 替換為 Uvicorn"]},"開發者工具 / DevOps":{"summary":"GitHub Actions OIDC 更新引入 repository custom properties 作為 JWT claims，讓 CI/CD 部署的雲端信任策略更細粒度；DevOps 工具鏈在 2026 年持續向安全性與可觀測性方向演進。","items":["GitHub Actions OIDC 現已支援 repository custom properties 作為 JWT token claims，可建立更精細的雲端信任策略（已 GA）","OIDC 短期令牌取代靜態 secret 是 CI/CD 安全加固的最佳實踐，適用於 AWS、Azure、GCP 部署","內部開發者平台（IDP）工具如 Backstage 在 2026 年持續成熟，集中管理基礎架構、工具元數據與服務目錄","複習推薦：GitHub Actions workflow 中的 permissions 欄位控制（id-token: write）是使用 OIDC 的必要前置條件"]}},"sources":[{"title":"Google ADK 官方文件 - 快速入門","url":"https://google.github.io/adk-docs/get-started/python/"},{"title":"GitHub - google/adk-python","url":"https://github.com/google/adk-python"},{"title":"Building Smart in 2026: A Hands-On First Look at Google ADK - DEV Community","url":"https://dev.to/njericodecraft/building-smart-in-2026-a-hands-on-first-look-at-googles-agent-development-kit-adk-3n0"},{"title":"FastAPI vs Flask Performance Comparison 2026 - Tech Insider","url":"https://tech-insider.org/fastapi-vs-flask-2026/"},{"title":"FastAPI vs Flask for AI APIs: Performance Comparison 2026 - Braincuber","url":"https://www.braincuber.com/blog/fastapi-vs-flask-for-ai-apis-performance-comparison"},{"title":"New AI Model Releases and Open Source Projects in April 2026 - Fazm Blog","url":"https://fazm.ai/blog/new-ai-model-releases-open-source-projects-april-2026"},{"title":"DeepSeek V4 Preview - Bloomberg","url":"https://www.bloomberg.com/news/articles/2026-04-24/deepseek-unveils-newest-flagship-a-year-after-ai-breakthrough"},{"title":"GitHub Actions Early April 2026 Updates - GitHub Changelog","url":"https://github.blog/changelog/2026-04-02-github-actions-early-april-2026-updates/"},{"title":"Meta Llama Stack - Build, Scale, and Streamline AI Development","url":"https://www.llama.com/products/llama-stack/"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
