name: Write Journal Entry (2026-05-08 08:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260508-0800.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-05-08","session_label":"08:00","tech_content":"**GitHub Copilot CLI 企業外掛與 MCP 伺服器全面整合**\n\nGitHub 於 2026 年 5 月初宣布 Copilot CLI 企業管理外掛進入公開預覽，讓組織管理員可透過 .github-private/.github/copilot/settings.json 統一設定並下發 MCP Server、hooks 與 skills 給整個企業的開發者。同期，GitHub MCP Server 的 Secret Scanning 正式 GA、Dependency Scanning 進入公開預覽，讓工程師在提交程式碼或開啟 PR 前，即可在 CLI 內掃描敏感資訊洩露與脆弱依賴套件。這波更新標誌著 AI 輔助工具從個人生產力工具演進為企業治理基礎設施，安全掃描與 AI 能力整合成為版本控管流程的一部分。\n\n**Ollama：讓本地端 LLM 推論成為開發者標配**\n\nOllama 是一個開源命令列工具，讓開發者無需雲端 API 金鑰，直接在自己的機器上執行 Llama 3.2、Qwen3、Gemma 等主流開源模型。Ollama 在本地啟動後會提供一個相容 OpenAI 格式的 REST API（預設 http://localhost:11434），可無縫接入既有的 RAG pipeline、LangChain Agent 或任何已整合 OpenAI SDK 的應用程式。2026 年的 Ollama 已從駭客圈的利基工具晉升為重視隱私、需要離線推論、或希望控制 AI 成本的後端工程師必備技術棧選項。\n\n**Temporal：分散式後端系統的耐久執行引擎**\n\nTemporal 解決了分散式系統中最棘手的工程問題：長時間運行的多步驟流程在中途失敗後如何可靠恢復。不同於傳統任務佇列，Temporal 透過 Event Sourcing 在每個步驟後持久化狀態，服務崩潰重啟後可從最後一個 checkpoint 繼續執行，無需開發者手寫重試邏輯或維護複雜的補償機制。Netflix、Snap 等公司已在訂單流程、影片轉碼等關鍵場景中採用 Temporal，其 Python 與 TypeScript SDK 讓 Web 後端開發者也能快速上手。","tech_application":"**① 用 Ollama 在本地端快速啟動私有 AI 助理**\n\n適合重視資料隱私或需要離線 AI 能力的後端工程師與全端開發者，安裝後立即可用，無需雲端帳戶或費用。\n\n```bash\n# 安裝 Ollama（macOS 或 Linux）\ncurl -fsSL https://ollama.com/install.sh | sh\n\n# 拉取並執行 Llama 3.2（3B 模型，16GB RAM 即可順跑）\nollama pull llama3.2\nollama run llama3.2\n\n# 確認本地 REST API 是否正常運行\ncurl http://localhost:11434/api/tags\n```\n\n**② 用 Temporal Python SDK 建立可自動重試的多步驟工作流程**\n\n適合需要處理長時間異步任務的後端工程師，例如跨服務資料同步、付款流程或 AI 推論 pipeline，確保即使服務崩潰也能從斷點繼續執行。\n\n```python\n# pip install temporalio\nfrom datetime import timedelta\nfrom temporalio import workflow, activity\n\n@activity.defn\nasync def process_payment(order_id: str) -> str:\n    # 實際付款邏輯，Temporal 在失敗時自動重試\n    return f\"付款完成：{order_id}\"\n\n@workflow.defn\nclass OrderWorkflow:\n    @workflow.run\n    async def run(self, order_id: str) -> str:\n        return await workflow.execute_activity(\n            process_payment,\n            order_id,\n            start_to_close_timeout=timedelta(minutes=5),\n        )\n```","learning_analysis":{"AI / 機器學習":{"summary":"Ollama 讓本地端 LLM 推論在 2026 年成為開發者標配，無需雲端帳戶即可執行主流開源模型；ReAct 架構（推理加行動循環）持續成為 AI Agent 開發的入門首選。","items":["Ollama 支援 Llama 3.2、Qwen3、Gemma 等模型，提供相容 OpenAI 格式的本地 REST API","16GB RAM 是執行 7B 參數模型的實用起點，Apple Silicon 效能表現尤為突出","ReAct 模式是 2026 年最穩健的 AI Agent 入門架構，可搭配 LangChain 快速實作"]},"雲端與基礎架構":{"summary":"Temporal 耐久執行引擎透過 Event Sourcing 解決多步驟分散式流程的失敗恢復問題，正成為現代雲端後端架構中不可或缺的元件；Argo CD 持續是 Kubernetes GitOps 部署的主流選項。","items":["Temporal 在每個工作流程步驟後持久化狀態，服務崩潰重啟後從 checkpoint 繼續，無需手動重試","Netflix、Snap 等公司在訂單流程與媒體處理等關鍵業務採用 Temporal","Argo CD 讓 Kubernetes 部署透過 GitOps 宣告式管理，持續整合與部署自動化"]},"前端開發":{"summary":"TanStack 生態系持續擴張，2026 年新增 TanStack DB、TanStack AI 等模組，讓前端架構更加模組化；Next.js 與 SvelteKit 等 Meta-framework 已成為多數專業 Web 專案的默認起點。","items":["TanStack 2026 年推出 TanStack DB、TanStack Store、TanStack AI，形成完整前端工具鏈","Playwright 已成為瀏覽器端對端測試的業界標準，自動等待機制降低測試不穩定性","Next.js 和 SvelteKit 等 Meta-framework 是多數專業 Web 專案的默認起點，負責處理效能與渲染"]},"後端 / 系統設計":{"summary":"Temporal 的耐久執行模型正成為現代後端設計中處理長時間異步流程的標準模式，替代複雜的手動重試與補償邏輯；後端工程師需在 API 設計階段同步規劃可觀測性架構。","items":["Temporal 提供 Go、Java、TypeScript、Python、.NET 等 SDK，TypeScript 和 Python 已達生產就緒水準","後端系統可觀測性設計（metrics、logs、traces）應與 API 設計同步進行，而非事後補加","事件驅動架構結合 Temporal 工作流程編排，是處理跨服務資料一致性的有效模式"]},"開發者工具 / DevOps":{"summary":"GitHub Copilot CLI 進入企業治理層，管理員可統一下發 MCP Server 和 hooks；Secret Scanning 與 Dependency Scanning 整合進 CLI 工作流程，讓安全掃描從獨立 CI 步驟提前至本地開發階段。","items":["GitHub Copilot CLI 企業外掛（2026-05-06 公開預覽）讓管理員透過 settings.json 統一配置 MCP Server 和 hooks","GitHub MCP Server 的 Secret Scanning 已正式 GA，Dependency Scanning 進入公開預覽","安全掃描前移至開發者本地環境，減少在 CI 階段才發現安全問題的修復成本"]}},"sources":[{"title":"Enterprise-managed plugins in GitHub Copilot CLI are now in public preview","url":"https://github.blog/changelog/2026-05-06-enterprise-managed-plugins-in-github-copilot-cli-are-now-in-public-preview/"},{"title":"Secret scanning with GitHub MCP Server is now generally available","url":"https://github.blog/changelog/2026-05-05-secret-scanning-with-github-mcp-server-is-now-generally-available/"},{"title":"Dependency scanning with GitHub MCP Server is in public preview","url":"https://github.blog/changelog/2026-05-05-dependency-scanning-with-github-mcp-server-is-in-public-preview/"},{"title":"Run Your Own AI Model Locally: A Practical Ollama Setup Guide (2026)","url":"https://dev.to/primghostdev/run-your-own-ai-model-locally-a-practical-ollama-setup-guide-2026-2kk9"},{"title":"Temporal Workflow Engine: The Reliability Layer Your Distributed System Is Missing [2026 Guide]","url":"https://dev.to/kunal_d6a8fea2309e1571ee7/temporal-workflow-engine-the-reliability-layer-your-distributed-system-is-missing-2026-guide-1ia9"},{"title":"What is Ollama? Complete Guide to Local AI Models (May 2026)","url":"https://www.thundercompute.com/blog/what-is-ollama-run-ai-models-locally"},{"title":"Temporal: Why Every Modern Backend Needs a Durable Workflow Engine","url":"https://medium.com/@i.abhishek.tripathi/temporal-explained-why-every-modern-backend-needs-a-durable-workflow-engine-5ae183211731"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://learning-journal.mariposa-lw.xyz/api/entries \
            -H "X-Journal-Key: $JOURNAL_API_KEY" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
