name: Write Journal Entry (2026-05-08 20:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260508-2000.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-05-08","session_label":"20:00","tech_content":"**RAG 生產級架構：2026 年企業 AI 系統的核心設計模式**\n\nRAG（檢索增強生成）在 2026 年已從實驗性技術演進為企業 AI 系統的標準架構。當 LLM 的訓練知識無法滿足即時業務需求時，RAG 透過向量資料庫在每次推論前動態注入最新私有知識，讓模型回答具備企業內部語境。2026 年的關鍵進展在於「混合檢索」策略：同時使用向量相似度搜尋（語義層）與 BM25 關鍵詞搜尋（精確層），再透過 RRF（Reciprocal Rank Fusion）合併兩路結果，召回率顯著優於單一策略。品質評估方面，RAGAS 框架提供四個量化指標：Faithfulness（答案忠於上下文，目標 >0.9）、Answer Relevancy（>0.85）、Context Precision（>0.8），讓 RAG 系統從「感覺有效」升級為可持續監控的工程系統。理解 RAG 的生產挑戰正是 2026 年 AI 後端工程師的核心競爭力之一。\n\n**React Server Components：前端 JavaScript 包體積的根本解方**\n\nReact Server Components（RSC）在 React 19 與 Next.js 14+ 正式穩定，直接解決了長久困擾前端工程師的問題：過多 JavaScript 在客戶端執行導致頁面載入緩慢。RSC 的核心思路是：預設所有元件在伺服器渲染並只傳送 HTML，只有明確需要互動的部分才加上 use client 標記交給瀏覽器處理。資料獲取邏輯可直接在元件內 await 資料庫或 API，不再需要 useEffect 加 useState 的客戶端 fetch 模式。實際測量顯示，將資料密集頁面（商品列表、新聞流）改為 Server Components 後，JavaScript bundle 大小可減少 40-70%，LCP 最大內容繪製時間明顯改善。Next.js 15 預設所有元件為 Server Component，理解這個模型已成為 2026 年 React 開發者的必備技能。\n\n**n8n：自建 AI 工作流程編排的開源實戰工具**\n\nn8n 是可自建（self-hosted）的開源工作流程自動化平台，在 2026 年因 AI agent 浪潮而從 DevOps 腳本工具升格為 AI 工作流程編排引擎。不同於 Zapier 或 Make 的純 SaaS 模式，n8n 可部署在自己的伺服器，數據不離開組織邊界，適合處理企業內部敏感文件。n8n 原生支援 OpenAI、Anthropic、Ollama 等 LLM 提供者，可視覺化串連 Trigger → 資料擷取 → LLM 推論 → 結果發送的完整 pipeline。典型應用場景包括：自動摘要每日 Slack 訊息寄送日報、從收到的 email 自動分類並寫入資料庫、或觸發 LLM 生成文件草稿。n8n 的無代碼介面讓不擅長撰寫程式的團隊成員也能參與 AI 流程設計，是組織內部推廣 AI 落地的有效切入點。","tech_application":"**① 用 LangChain 建立具備 RAGAS 評估的 RAG 問答系統**\n\n適合開發 AI 應用的後端工程師，目標是搭建可量化品質的 RAG 問答系統，不只依賴主觀感受，而是用量化指標持續監控回答品質。\n\n```python\n# pip install langchain faiss-cpu sentence-transformers openai\nfrom langchain.text_splitter import RecursiveCharacterTextSplitter\nfrom langchain_community.vectorstores import FAISS\nfrom langchain_community.embeddings import HuggingFaceEmbeddings\nfrom langchain_openai import ChatOpenAI\nfrom langchain.chains import RetrievalQA\n\n# 1. 文件切塊（512 tokens，128 重疊）\nsplitter = RecursiveCharacterTextSplitter(chunk_size=512, chunk_overlap=128)\ndocs = splitter.create_documents([your_document_text])\n\n# 2. 向量化並建立 FAISS 索引\nembeddings = HuggingFaceEmbeddings(model_name=\"BAAI/bge-small-zh-v1.5\")\nvectorstore = FAISS.from_documents(docs, embeddings)\n\n# 3. 建立 RAG Chain\nllm = ChatOpenAI(model=\"gpt-4o-mini\", temperature=0)\nqa_chain = RetrievalQA.from_chain_type(\n    llm=llm,\n    retriever=vectorstore.as_retriever(search_kwargs={\"k\": 4}),\n    return_source_documents=True,\n)\nresult = qa_chain.invoke({\"query\": \"請說明系統設計原則\"})\nprint(result[\"result\"])\n```\n\n**② 用 Docker 快速部署 n8n 並建立 AI 自動摘要工作流程**\n\n適合想自建 AI 工作流程、重視資料隱私的開發者或小型技術團隊，全程在本地或自有伺服器執行，不依賴第三方 SaaS 平台。\n\n```bash\n# 以 Docker 啟動 n8n（資料持久化至 ~/.n8n）\ndocker run -d --name n8n \\\n  -p 5678:5678 \\\n  -v ~/.n8n:/home/node/.n8n \\\n  -e N8N_BASIC_AUTH_ACTIVE=true \\\n  -e N8N_BASIC_AUTH_USER=admin \\\n  -e N8N_BASIC_AUTH_PASSWORD=changeme \\\n  n8nio/n8n\n\n# 開啟 n8n 介面，拖拉節點設計 AI 工作流程\nopen http://localhost:5678\n\n# 在介面中新增 Credentials：OpenAI API 或 Anthropic\n# 再串接：Webhook Trigger → HTTP Request → AI Agent（LLM）→ Send Email\n```","learning_analysis":{"AI / 機器學習":{"summary":"RAG 在 2026 年進入生產成熟期，混合檢索策略（向量搜尋加 BM25）與 RAGAS 評估框架成為企業 AI 後端工程的標準配備；AI agent 編排工具如 n8n 讓工程師可快速將 LLM 推論整合進現有業務流程，降低 AI 落地的門檻。","items":["RAG 混合檢索結合向量相似度與 BM25 關鍵詞搜尋，透過 RRF 合併兩路結果，召回率優於單一策略","RAGAS 提供 Faithfulness、Answer Relevancy、Context Precision 三大量化指標，讓 RAG 品質可監控可改善","語意分塊（Semantic Chunking）依嵌入相似度偵測主題邊界，比固定大小切割更能保留段落語意完整性"]},"雲端與基礎架構":{"summary":"OpenTofu 作為 Terraform 的開源替代方案在 2026 年持續成熟，Pulumi 宣布原生支援 Terraform HCL，讓既有程式碼可在 Pulumi 編排層運行，IaC 工具選擇已從 Terraform 一統天下演進為多選項共存的生態。","items":["OpenTofu（Terraform fork）由社群治理，授權模型完全開源，是需要 BSL 授權替代方案的首選工具","Pulumi 支援 TypeScript、Python、Go 等程式語言撰寫基礎設施，2026 年起同時支援 HCL 語法","IaC 最佳實踐建議搭配模組化設計，並將基礎設施程式碼納入 CI/CD 管線自動執行 plan 與 apply 步驟"]},"前端開發":{"summary":"React Server Components 在 React 19 與 Next.js 14+ 正式穩定，成為 2026 年前端架構的核心轉變，資料密集頁面改用 RSC 可減少 40-70% JavaScript bundle，伺服器優先、客戶端最小化是新一代 React 應用的設計原則。","items":["RSC 預設伺服器渲染，只有加上 use client 的元件才送出 JavaScript，大幅降低初始載入體積","Next.js 15 預設所有元件為 Server Component，資料獲取可直接在元件內 await，不需要客戶端 fetch 模式","混合架構：Server Components 負責靜態內容與資料獲取，Client Components 負責互動邏輯與狀態管理"]},"後端 / 系統設計":{"summary":"BFF（Backend for Frontend）模式在 2026 年隨著多客戶端 API 服務普及而更受重視，為不同前端客戶端量身打造專屬 API 閘道；CQRS 持續是高讀寫比系統的標準設計選項，Modular Monolith 則是微服務的務實替代方案。","items":["BFF 模式為每個客戶端類型（iOS、Android、Web SPA）建立獨立 API 層，個別優化資料結構與聚合邏輯","CQRS（命令查詢職責分離）將寫入（一致性優先）與讀取（速度優先）分離，適合讀寫比例懸殊的系統","Modular Monolith 是微服務的務實替代方案，獲得 80% 的微服務好處，只需 20% 的運維成本"]},"開發者工具 / DevOps":{"summary":"n8n 在 2026 年從 DevOps 腳本工具演進為 AI 工作流程編排平台，可自建部署、原生整合主流 LLM，是組織推動 AI 落地的低摩擦切入點；GitHub Copilot 在 VS Code 的 April 更新強化 workspace 級別程式碼分析，讓跨檔案重構建議更準確。","items":["n8n 可 Docker 一行部署，資料留在自有伺服器，適合有隱私顧慮的企業內部 AI 自動化場景","n8n 原生支援 OpenAI、Anthropic、Ollama 節點，可視覺化設計 RAG pipeline 或多步驟 AI agent","GitHub Copilot VS Code v1.116-v1.119 更新增強 workspace-wide 程式碼分析，跨檔案重構建議更準確"]}},"sources":[{"title":"RAG Production Guide 2026: Retrieval-Augmented Generation","url":"https://lushbinary.com/blog/rag-retrieval-augmented-generation-production-guide/"},{"title":"RAG in 2026: How Retrieval-Augmented Generation Works for Enterprise AI","url":"https://www.techment.com/blogs/rag-in-2026/"},{"title":"React Server Components Explained: Complete 2026 Guide","url":"https://muhammadarslan.codes/blog/react-server-components-complete-guide"},{"title":"React Server Components in Production: Benefits, Pitfalls and Best Practices for 2026","url":"https://www.growin.com/blog/react-server-components/"},{"title":"n8n Guide 2026: Features and Workflow Automation Deep Dive","url":"https://hatchworks.com/blog/ai-agents/n8n-guide/"},{"title":"n8n Tutorial for Beginners (2026): Build Your First AI Workflow","url":"https://community.n8n.io/t/n8n-tutorial-for-beginners-2026-part-1-build-your-first-ai-workflow/261168"},{"title":"Infrastructure as Code: Terraform vs OpenTofu vs Pulumi - A 2026 Comparison","url":"https://dasroot.net/posts/2026/01/infrastructure-as-code-terraform-opentofu-pulumi-comparison-2026/"},{"title":"Backend Architecture Patterns: A Practical Guide for 2026","url":"https://codelit.io/blog/backend-architecture-patterns-guide"},{"title":"GitHub Copilot in Visual Studio Code, April releases","url":"https://github.blog/changelog/2026-05-06-github-copilot-in-visual-studio-code-april-releases/"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
