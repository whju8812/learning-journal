name: Write Journal Entry (2026-05-11 08:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260511-0800.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-05-11","session_label":"08:00","tech_content":"**AI Agent 實作核心：ReAct 模式與工具設計**\n\nAI Agent 由四個核心元素構成：LLM（推理大腦）、記憶體、工具集合與執行環境。2026 年最受推薦的入門架構是 ReAct（Reasoning + Acting），讓 LLM 在「思考 → 行動 → 觀察結果 → 再思考」的迴圈中完成複雜任務。關鍵工程洞見在於：工具設計的品質遠比 prompt 調整重要——給 Agent 嚴格定義的 input schema 可大幅減少執行錯誤與無限迴圈。建議從 2-4 個工具出發（如 searchKnowledgeBase、classifyRequest），再逐步擴展。短期記憶處理當前 session 上下文，長期記憶則透過向量資料庫跨 session 累積知識。LangChain 目前仍是社群最大、文件最完整的 Agent 框架，適合快速驗證概念。\n\n**GitHub Copilot Agent Mode 重大升級：瀏覽器整合與終端讀寫**\n\nGitHub Copilot 在 VS Code 的 2026 年 4 月版本帶來數項關鍵 agentic 能力：Agent 現在可直接讀取與寫入前景終端（含執行中的 REPL），也可透過 browser tab sharing 即時感知瀏覽器頁面並互動驗證變更。Copilot Business 與 Enterprise 用戶新增「自帶 API key」功能，支援 Anthropic、Google、OpenAI、OpenRouter 等提供商，可在 VS Code 中使用指定模型。長時間執行的 Agent 任務現在支援從 GitHub.com 或手機 App 遠端監控與介入，調試日誌跨 session 持久保存。這些升級讓 AI 輔助開發從程式碼補全建議正式進化為具備環境感知能力的自主工作夥伴，標誌著 AI Copilot 發展的重要里程碑。\n\n**mise：一個工具取代 asdf、direnv 與 Make**\n\nmise（mise-en-place）是以 Rust 撰寫的開發工具版本管理器，可在單一 .mise.toml 設定檔中統一處理三件事：工具版本管理（取代 asdf / pyenv / tfenv）、專案環境變數載入（取代 direnv）、以及自動化 task 執行（取代 Make）。對於需要在多個專案間切換 Node.js、Python、Go 版本的開發者，mise 解決了環境污染與指令不一致的核心痛點，且因 Rust 實作而速度極快。Hacker News 近期討論中，有開發者分享用 mise 統一管理後，新成員 onboarding 時間從數小時縮短至幾分鐘；mise 同時相容 asdf 的 .tool-versions 格式，遷移成本極低。","tech_application":"**① 用 Python + LangChain 建立 ReAct AI Agent**\n\n適合後端開發者或 AI 工程師，在有明確任務目標的專案中（如文件問答、自動化資料處理）部署第一個 AI Agent。首先安裝依賴：\n\n```bash\npip install langchain langchain-openai langchain-community duckduckgo-search\n```\n\n建立 Agent 並執行：\n\n```python\nfrom langchain import hub\nfrom langchain.agents import AgentExecutor, create_react_agent\nfrom langchain_openai import ChatOpenAI\nfrom langchain_community.tools import DuckDuckGoSearchRun\n\nllm = ChatOpenAI(model=\"gpt-4o-mini\")\ntools = [DuckDuckGoSearchRun()]\nprompt = hub.pull(\"hwchase17/react\")\nagent = create_react_agent(llm, tools, prompt)\nexecutor = AgentExecutor(agent=agent, tools=tools, verbose=True)\nresult = executor.invoke({\"input\": \"2026 年最受歡迎的開源開發工具有哪些？\"})\nprint(result[\"output\"])\n```\n\n從 2 個工具開始，觀察 verbose 輸出中 Agent 的推理鏈，再依需求擴充工具集合。\n\n**② 用 mise 統一管理多語言開發環境**\n\n適合需要在同一台機器維護多個專案（各有不同 Node/Python 版本）的全端或後端開發者，三步驟完成安裝與設定：\n\n```bash\ncurl https://mise.run | sh\necho eval \"$(mise activate bash)\" >> ~/.bashrc\nsource ~/.bashrc\n```\n\n在專案根目錄建立 .mise.toml：\n\n```toml\n[tools]\nnode = \"22\"\npython = \"3.12\"\n\n[env]\nDATABASE_URL = \"postgresql://localhost/mydb\"\n\n[tasks.dev]\nrun = \"npm run dev\"\n```\n\n執行 mise install 自動安裝所需版本，mise run dev 啟動開發環境。新成員 onboarding 只需兩個指令完成環境建置。","learning_analysis":{"AI / 機器學習":{"summary":"ReAct 模式（推理+行動迴圈）成為 2026 年 AI Agent 開發的主流入門架構，LangChain 為最普及框架；工具設計品質直接決定 Agent 可靠度，建議從少量高品質工具出發再擴展","items":["AI Agent 四元素：LLM 推理大腦 + 記憶體（短期/向量 DB）+ 工具集合 + 執行環境","ReAct 架構：思考 → 行動 → 觀察 → 再思考，入門友好且已被生產環境驗證","工具設計優先於 prompt 調整，嚴格的 input schema 可減少迴圈錯誤與不安全執行","LangChain 為 2026 年最大 Agent 框架社群，支援幾乎所有主流 LLM 提供商"]},"雲端與基礎架構":{"summary":"GitHub Actions 已成為大多數團隊的預設 CI/CD 平台；現代 pipeline 涵蓋漏洞掃描、staging 驗證與自動 rollback；Microsoft Defender for Cloud 與 GitHub 整合的 code-to-cloud 風險可視性已正式 GA","items":["GitHub Actions 以 YAML workflow 定義 CI/CD，觸發條件包含 push、PR、排程等","現代 pipeline 流程：commit → 測試 → 容器建置 → 漏洞掃描 → staging → 整合測試 → 漸進部署","AWS 典型流程：CodePipeline → CodeBuild → ECR → ECS/EKS 部署，搭配自動 rollback","Microsoft Defender for Cloud code-to-cloud 整合（2026-05-05 GA）：從 GitHub 層偵測雲端風險"]},"前端開發":{"summary":"Next.js 與 SvelteKit 在 2026 年依然是主流全端框架選擇，強調效能與 edge-readiness；TypeScript 已接近大型前端專案的標配，Server Components 持續普及化","items":["Next.js 持續主導 React 生態系全端框架，App Router 與 Server Components 成為主流","SvelteKit 以編譯器架構換取執行期輕量，適合重視 Core Web Vitals 的專案","TypeScript 在 2026 年前端專案採用率持續攀升，新專案幾乎默認使用","前端學習路線：HTML/CSS/JS 基礎 → React/Svelte → TypeScript → 雲端部署"]},"後端 / 系統設計":{"summary":"Modular Monolith（模組化單體）在 2026 年受到重新重視，以 80% 微服務效益換取 20% 運維成本；Circuit Breaker 與 CQRS 仍是分散式系統的關鍵韌性與擴展模式，應依需求而非潮流引入","items":["Modular Monolith：清晰模組邊界搭配單一部署，適合多數中型團隊的架構起點","Circuit Breaker：暫時阻斷對故障服務的請求，防止分散式系統連鎖崩潰","CQRS（命令查詢責任分離）：適用於讀寫比例差異大的大規模系統","架構原則：先從簡單開始，依實際遇到的問題再引入對應模式，避免過度設計"]},"開發者工具 / DevOps":{"summary":"mise 成為 2026 年熱門的一站式開發環境管理工具，取代 asdf + direnv + Make；GitHub Copilot Agent Mode 進入實用階段，支援終端讀寫與瀏覽器感知，85% 開發者使用 AI 工具後每日節省 30-60 分鐘","items":["mise：單一 .mise.toml 管理工具版本、環境變數、task 執行，Rust 實作速度快","GitHub Copilot Agent Mode 新增：終端讀寫、瀏覽器 tab 感知、BYOK 模型支援","Copilot 長時間 Agent 任務可從 GitHub.com 或手機 App 遠端監控與介入","2026 年 85% 開發者使用 AI 工具，平均每日節省 30-60 分鐘例行編碼時間"]}},"sources":[{"title":"dev.to: How to Build an AI Agent Step-by-Step: Complete Beginners Guide 2026","url":"https://dev.to/nova_gg/how-to-build-an-ai-agent-step-by-step-complete-beginners-guide-2026-4ln7"},{"title":"GitHub Changelog: GitHub Copilot in Visual Studio Code, April releases","url":"https://github.blog/changelog/2026-05-06-github-copilot-in-visual-studio-code-april-releases/"},{"title":"GitHub Changelog: Enterprise-managed plugins in GitHub Copilot CLI now in public preview","url":"https://github.blog/changelog/2026-05-06-enterprise-managed-plugins-in-github-copilot-cli-are-now-in-public-preview/"},{"title":"GitHub Changelog: Code-to-cloud risk visibility with Microsoft Defender for Cloud GA","url":"https://github.blog/changelog/2026-05-05-code-to-cloud-risk-visibility-with-microsoft-defender-for-cloud-is-now-generally-available/"},{"title":"mise official getting started guide","url":"https://mise.jdx.dev/getting-started.html"},{"title":"BetterStack: Getting Started with mise","url":"https://betterstack.com/community/guides/scaling-nodejs/mise-explained/"},{"title":"Medium: Building a Production-Ready CI/CD Pipeline: The Complete 2026 Guide","url":"https://medium.com/@krishnafattepurkar/building-a-production-ready-ci-cd-pipeline-the-complete-2026-guide-b3d6a661ecd8"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
