jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-05-12","session_label":"20:00","tech_content":"**WebAssembly 突破瀏覽器邊界：2026 年伺服器端 WASM 元年**\n\n2026 年 WebAssembly 的使用率突破關鍵里程碑：67% 的開發者已在生產環境部署 WASM，且伺服器端應用首次超越純瀏覽器場景。WASM 最大的技術優勢在於極短冷啟動時間——容器化 serverless 函式平均冷啟動需 100–500 毫秒，而 WASM 函式僅需微秒級別，AWS Lambda 已將其列為第一級執行環境，效能測試顯示冷啟動比容器快 10–40 倍。Cloudflare Workers 更以 WASM V8 隔離技術在全球 330 個邊緣節點部署 Llama-3-8b 模型，冷啟動維持在 5 毫秒以下，推論速度提升 2–4 倍，讓邊緣 AI 推論正式進入實用階段。對前端工程師而言，Rust 搭配 wasm-pack 編譯的 WASM 模組處理 4K 圖片縮放僅需 4.2 毫秒，比等效 JavaScript 快 4 倍以上，Figma 和 Google Sheets 均以 WASM 為核心渲染引擎。\n\n**Bun 1.3：取代 Node.js 工具鏈的全能 JavaScript 執行環境**\n\nBun 於 2026 年 2 月發布 1.3 版，正式進入成熟生產階段。效能上，其 HTTP 伺服器每核心每秒可處理超過 100 萬個請求，是 Express on Node.js 的 2.5 倍；維持 10,000 條 WebSocket 連線僅消耗 35MB 記憶體，而 Node.js 需要 250MB，冷啟動時間 31 毫秒對比 Node.js 的 142 毫秒，快 4.6 倍，對 serverless 部署特別有利。工具整合是 Bun 更大的賣點：內建 TypeScript 轉譯器（無需 tsc）、Jest 相容測試框架、esbuild 等級的打包器，以及比 npm 快 5 倍的套件管理器，單一執行檔取代整個前端工具鏈，徹底消除工具版本衝突問題。Vercel 已認證 Bun 作為 Edge 平台執行環境，截至 2026 年 4 月約 20% 的新 Next.js 生產部署採用 Bun，Hono 與 Elysia 框架更是專為 Bun 能力設計。\n\n**PostgreSQL 18 效能調優：系統化找出慢查詢與新特性應用**\n\nPostgreSQL 18 引入非同步 I/O（AIO）改進，順序掃描與 VACUUM 操作效能提升 2–3 倍，並新增原生 uuidv7() 函式，產生以時間戳排序的 UUID，從根本解決傳統 UUID v4 導致 B-tree 索引碎片的問題，在高頻 INSERT 場景下效能顯著提升。系統化調優的標準流程：首先啟用 pg_stat_statements 擴充套件，查詢累計執行時間最高的語句，再以 EXPLAIN (ANALYZE, BUFFERS) 定位執行計畫瓶頸（Seq Scan 是否應改為 Index Scan？Join 方式是否最優？）。連線管理同樣關鍵：PostgreSQL 每條連線建立獨立 process，高流量下須透過 pgBouncer 連線池控制並發，在不修改應用程式碼的情況下大幅降低 RAM 消耗，並預防連線數爆炸造成的服務中斷。","tech_application":"**① 使用 Bun 1.3 建立高效能 REST API**\n\n適合已熟悉 Node.js 的後端或全端開發者，希望在不重寫業務邏輯的情況下大幅提升 API 吞吐量。Bun 相容 Node.js API，遷移成本低，冷啟動比 Node.js 快 4.6 倍，特別適合 serverless 部署場景。\n\n```bash\n# 安裝 Bun（Linux / macOS）\ncurl -fsSL https://bun.sh/install | bash\n\n# 建立並進入新專案\nbun init my-api && cd my-api\n```\n\n```typescript\n// server.ts — 內建 HTTP 伺服器，無需額外框架\nconst server = Bun.serve({\n  port: 3000,\n  fetch(req) {\n    const url = new URL(req.url);\n    if (url.pathname === \"/api/hello\") {\n      return Response.json({ message: \"Hello from Bun!\", runtime: \"bun\" });\n    }\n    return new Response(\"Not found\", { status: 404 });\n  },\n});\nconsole.log(`Listening on http://localhost:${server.port}`);\n```\n\n```bash\n# 直接執行 TypeScript，無需編譯步驟\nbun run server.ts\n\n# 執行測試（相容 Jest 語法）\nbun test\n```\n\n**② PostgreSQL 慢查詢系統化分析**\n\n適合資料庫查詢出現效能瓶頸的後端工程師或 DBA，希望以數據驅動的方式找出並修復慢查詢。\n\n```sql\n-- 啟用 pg_stat_statements 擴充套件\n-- 需在 postgresql.conf 加入：shared_preload_libraries = pg_stat_statements\nCREATE EXTENSION IF NOT EXISTS pg_stat_statements;\n\n-- 找出累計執行時間最高的前 10 個查詢\nSELECT\n  round(total_exec_time::numeric, 2) AS total_ms,\n  calls,\n  round(mean_exec_time::numeric, 2) AS avg_ms,\n  left(query, 80) AS query_preview\nFROM pg_stat_statements\nORDER BY total_exec_time DESC\nLIMIT 10;\n\n-- 對慢查詢執行詳細分析，查看執行計畫與緩衝區使用\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT * FROM orders WHERE user_id = 123 ORDER BY created_at DESC LIMIT 20;\n\n-- PostgreSQL 18 新特性：uuidv7() 產生時間戳排序 UUID\n-- 取代 uuid_generate_v4()，避免 B-tree 索引碎片問題\nINSERT INTO events (id) VALUES (uuidv7());\n```","learning_analysis":{"AI / 機器學習":{"summary":"WebAssembly 為 AI 推論帶來邊緣部署新模式，Cloudflare Workers 已透過 WASM 在全球 330 個節點部署 Llama-3-8b，冷啟動低於 5 毫秒，推論速度提升 2–4 倍，邊緣 AI 推論進入實用階段。","items":["Cloudflare Workers 以 WASM V8 隔離技術在 330 個全球節點部署 Llama-3-8b，冷啟動低於 5 毫秒，推論速度提升 2–4 倍","WASM 模組處理 4K 圖片縮放僅需 4.2 毫秒，比 JavaScript 快 4 倍以上，適合瀏覽器端 AI 前處理管線","AWS Lambda 將 WASM 列為第一級執行環境，AI 推論函式冷啟動比容器快 10–40 倍，大幅降低推論延遲"]},"雲端與基礎架構":{"summary":"WASM serverless 在 2026 年成為雲端基礎架構的新選項，微秒級冷啟動使其在高並發短時任務上顯著優於傳統容器，AWS Lambda 和 Cloudflare Workers 均已提供第一級支援。","items":["WASM serverless 冷啟動時間為微秒級，相較容器化 serverless 的 100–500 毫秒有數量級差異","AWS Lambda 原生支援 WASM 執行環境，效能基準測試顯示冷啟動快 10–40 倍","pgBouncer 連線池為 PostgreSQL 高流量場景的標準解決方案，在不修改應用程式碼下大幅提升資料庫承載量"]},"前端開發":{"summary":"Bun 1.3 已成為 Vercel Edge 平台的認證執行環境，約 20% 的新 Next.js 生產部署採用 Bun；WASM 在瀏覽器端的效能應用也已成熟，Figma 和 Google Sheets 均以 WASM 為核心渲染引擎。","items":["Bun 1.3 內建 TypeScript 轉譯器、Jest 相容測試框架、esbuild 等級打包器，一個執行檔取代整個前端工具鏈","Vercel 認證 Bun Edge runtime，2026 年 4 月約 20% 的新 Next.js 生產部署使用 Bun","Figma 以 WASM 作為核心渲染引擎，載入時間降低 3 倍；Google Sheets 同樣採用 WASM 提升試算表計算效能"]},"後端 / 系統設計":{"summary":"Bun 1.3 以每核心 100 萬請求每秒的吞吐量成為 Node.js 的強力替代方案，PostgreSQL 18 的 AIO 改進與 uuidv7() 函式為資料庫效能帶來新工具，兩者均已達生產可用狀態。","items":["Bun HTTP 伺服器每核心達 100 萬請求每秒，是 Express on Node.js 的 2.5 倍；WebSocket 記憶體消耗降低 7 倍","PostgreSQL 18 非同步 I/O 改進使順序掃描與 VACUUM 效能提升 2–3 倍，uuidv7() 解決高頻 INSERT 的索引碎片問題","pg_stat_statements + EXPLAIN (ANALYZE, BUFFERS) 是系統化定位慢查詢的標準工作流程，應主動部署而非事後排查"]},"開發者工具 / DevOps":{"summary":"Bun 以單一執行檔整合執行環境、套件管理、測試框架與打包器，消除工具鏈碎片化問題；WASM 工具鏈（Rust + wasm-pack 0.12.0）已成熟，可納入 CI/CD 管道進行跨平台模組建置。","items":["Bun 套件管理器比 npm 快 5 倍，在 CI 環境中可顯著縮短依賴安裝時間，減少 pipeline 等待成本","wasm-pack 0.12.0 + Rust 1.85 為建置瀏覽器與伺服器端 WASM 模組的成熟工具鏈，已可納入標準 CI/CD 流程","Bun 冷啟動 31 毫秒對比 Node.js 的 142 毫秒，4.6 倍優勢在 serverless 函式部署場景中直接轉化為成本節省"]}},"sources":[{"title":"WebAssembly in 2026: Beyond the Browser - Server, Edge, and Embedded","url":"https://devstarsj.github.io/webdev/2026/02/02/WebAssembly-Wasm-2026-Guide/"},{"title":"WebAssembly WASI 2026: Server-Side Wasm Revolution","url":"https://calmops.com/programming/webassembly-wasi-2026-server-side-wasm/"},{"title":"2026 WebAssembly Tutorial: Rust 1.85 & wasm-pack 0.12.0","url":"https://johal.in/tutorial-build-2026-webassembly-app-rust-185-wasm-pack/"},{"title":"Bun 2026: The All-in-One JavaScript Runtime Leaving Node.js Behind","url":"https://ajianaz.dev/bun-2026-the-all-in-one-javascript-runtime-thats-leaving-node-js-in-the-dust/"},{"title":"Bun JavaScript Tutorial: Build a REST API in 13 Steps [2026]","url":"https://tech-insider.org/bun-javascript-tutorial-rest-api-2026/"},{"title":"Node vs Bun vs Deno: What Actually Runs in Production (2026 Guide)","url":"https://javascript.plainenglish.io/node-vs-bun-vs-deno-what-actually-runs-in-production-2026-guide-a3552c18ce91"},{"title":"PostgreSQL Performance Tuning: Essential 2026 Expert Guide","url":"https://www.zignuts.com/blog/postgresql-performance-tuning"},{"title":"Database Performance Optimization: Query Tuning and Explain Plans","url":"https://dasroot.net/posts/2026/04/database-performance-optimization-query-tuning-explain-plans/"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://learning-journal.mariposa-lw.xyz/api/entries \
            -H "X-Journal-Key: $JOURNAL_API_KEY" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
