  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-05-15","session_label":"20:00","tech_content":"**CSS Anchor Positioning：告別 JS 定位套件的原生瀏覽器 UI 時代**\n\nCSS Anchor Positioning 在 Firefox 147 支援後正式達到 Baseline Newly Available 狀態，Chrome 125+、Firefox 147+、Safari 26 三大引擎全面支援。這項規範從根本解決了前端長年的痛點：tooltip、popover、下拉選單的相對定位計算必須依賴 Floating UI、Popper.js、Tippy.js 等 JavaScript 套件，原因是 CSS 過去無法讓一個元素感知另一個元素的邊界座標。Anchor Positioning 以兩個核心語法解決：anchor-name 屬性為目標元素命名錨點，anchor() 函式讓定位元素直接引用錨點的邊界（top、right、bottom、left、center）。@position-try 規則讓瀏覽器在空間不足時自動嘗試替代定位策略——tooltip 在視窗邊緣自動反轉，不需 JavaScript 偵測 overflow。對 2026 年新專案，純 CSS 已可實作大多數相對定位 UI，少一個 JS 依賴等於少一個 bundle 體積與潛在攻擊面。\n\n**Python 3.14 Free-Threading：後 GIL 時代正式到來**\n\nPython 3.14 正式版與 PEP 779 將 free-threaded build（無 GIL 模式）從實驗性升格為官方支援。全局直譯器鎖（GIL）長期是 Python CPU 密集工作負載的根本瓶頸——多執行緒在 GIL 下實質等同單核心序列執行。3.14 的 free-threaded 模式以物件層級的細粒度鎖與偏向式引用計數（biased reference counting）取代全域鎖，4 核心機器的 CPU-bound 任務可見 2-4 倍加速，且近線性擴展。安裝方式直觀：uv 加上 t 後綴（uv venv --python 3.14t）即建立 free-threaded 虛擬環境，sys._is_gil_enabled() 可驗證 GIL 狀態。現有程式碼多數無需修改即可受益，但需注意二進位套件須確認重新編譯，共享可變狀態須明確加鎖，GIL 移除後 race condition 風險真實存在。\n\n**Shopify River：公開透明的 AI Coding Agent 組織學習模型**\n\nShopify 內部 AI 編碼代理人 River 以特殊設計引發業界關注：River 只接受公開 Slack 頻道的指令，拒絕私訊，強制所有互動可被全體員工觀察。30 天內 5,938 名員工在 4,450 個頻道使用 River，每週開出 1,870 個 Pull Request，PR 合并率在兩個月內從 36% 提升至 77%，目前約 1/8 的合入 PR 由 River 撰寫。公開互動讓提示詞技巧、除錯模式在組織中自然擴散，形成集體智識資本。對考慮企業導入 AI Coding Agent 的工程師，River 的核心教訓是：agent 的治理模型（公開 vs. 私有互動）直接影響組織學習速度，技術以外的設計決策同樣關鍵。","tech_application":"**① 用 CSS Anchor Positioning 建立原生 Tooltip**\n\n適合前端工程師，在建構 tooltip、popover、dropdown 等相對定位 UI 的場景。CSS Anchor Positioning 已達 Baseline Newly Available，可安全用於 Chrome 125+、Firefox 147+、Safari 26 的生產環境。\n\n```css\n/* 定義錨點元素 */\n.trigger {\n  anchor-name: --my-tooltip;\n}\n\n/* 定位元素：錨點上方居中 */\n.tooltip {\n  position: absolute;\n  position-anchor: --my-tooltip;\n  bottom: anchor(top);\n  left: anchor(center);\n  translate: -50% -8px;\n\n  /* 空間不足時自動切換至錨點下方 */\n  @position-try --flip {\n    top: anchor(bottom);\n    bottom: unset;\n    translate: -50% 8px;\n  }\n  position-try-fallbacks: --flip;\n}\n```\n\n**② 用 uv + Python 3.14t 啟動 Free-Threaded 環境**\n\n適合後端工程師處理 CPU 密集型工作負載：影像處理、資料轉換、數值計算。不需改寫為 C 擴展或切換語言，即可獲得真正的多核心並行。\n\n```bash\nuv python install 3.14t\nuv venv --python 3.14t .venv\nsource .venv/bin/activate\npython -c \"import sys; print(sys._is_gil_enabled())\"\n# 輸出：False\n```\n\n```python\nimport threading\nimport time\n\ndef cpu_task():\n    total = 0\n    for _ in range(10**7):\n        total += 1\n\nthreads = [threading.Thread(target=cpu_task) for _ in range(4)]\nstart = time.time()\nfor t in threads:\n    t.start()\nfor t in threads:\n    t.join()\nprint(round(time.time() - start, 2))\n```\n\n注意：確認第三方套件支援 free-threaded 版本，py.org/freethreading 提供相容性列表。","learning_analysis":{"AI / 機器學習":{"summary":"Shopify River 以公開 Slack 頻道作為 AI Coding Agent 的強制互動模式，30 天 5,938 人使用、每週 1,870 個 PR、合并率從 36% 升至 77%，是目前最具參考價值的企業級 AI Agent 組織落地案例。Qwen3 系列在 Hugging Face 成為 2026 年本地部署 LLM 首選，MoE 架構讓消費級硬體可運行高品質開放模型。","items":["Shopify River：公開頻道強制透明，每週 1,870 PR，PR 合并率 36% → 77%","Qwen3 30B-A3B MoE：30B 總參數、每 token 啟動 3B，適合 16GB RAM 以上設備本地推論","Ollama + Qwen3：port 11434 OpenAI-compatible API，現有程式碼零修改接入","Continue.dev + Qwen3 本地模型：VS Code 行內補全整合最速方案"]},"雲端與基礎架構":{"summary":"Python 3.14 free-threaded build 正式取得官方支援，uv 成為 Python 版本管理新標準，雲端 Python 服務首次能透過多執行緒真正利用多核心 CPU，對機器學習前處理、資料管道等 CPU 密集場景具直接影響。","items":["Python 3.14t：uv venv --python 3.14t 一行建立 free-threaded 環境","4 核心 CPU-bound 任務：free-threading 實測 2-4x 加速，近線性擴展","Biased reference counting：per-object 細粒度鎖取代全域 GIL 的底層機制","二進位套件相容性：free-threaded 版本須重新編譯，py.org/freethreading 查詢列表"]},"前端開發":{"summary":"CSS Anchor Positioning 達到 Baseline Newly Available（Chrome 125+、Firefox 147+、Safari 26 全支援），anchor-name 與 anchor() 函式讓元素相對定位成為純 CSS 能力，@position-try 實現宣告式溢出反轉，終結需要 Floating UI 等 JS 套件才能實作 tooltip 的時代，是近年瀏覽器原生能力最具實用影響的進展之一。","items":["CSS Anchor Positioning Baseline 2026：三大瀏覽器全支援，可安全用於生產","anchor-name + anchor() 語法：宣告式替代 getBoundingClientRect() 計算定位","@position-try：空間不足時自動切換定位策略，不需 JS 偵測 overflow","移除 Floating UI / Popper.js / Tippy.js：減少 bundle 體積與依賴攻擊面"]},"後端 / 系統設計":{"summary":"Python 3.14 free-threading 正式可用改變了後端服務的設計選項——過去需要 multiprocessing 才能利用多核的 CPU 密集邏輯，現在可以用更輕量的 threading 達到相同效果，進程間通訊（IPC）的複雜度大幅降低，對 ML 推論前處理、ETL 管道、影像處理服務等 Python 後端場景影響尤深。","items":["Free-threaded Python 適用場景：CPU 密集型資料處理、影像轉換、數值計算","asyncio 仍是 IO 密集場景首選；free-threading 針對 CPU-bound 工作負載","Race condition 新風險：GIL 移除後共享可變狀態須明確加鎖（threading.Lock）","multiprocessing → threading 遷移：降低 IPC 複雜度，記憶體共享更直觀"]},"開發者工具 / DevOps":{"summary":"Shopify River 公開互動模式示範了企業 AI Coding Agent 的組織導入策略，知識在公開頻道中自然擴散；Shopify AI Toolkit（MIT 授權）整合 MCP、Cursor、Claude Code，為工程師提供完整 AI 輔助開發工具鏈；uv 作為 Python 工具鏈的統一入口，版本管理、虛擬環境、套件安裝一站式完成。","items":["Shopify River：公開 Slack 頻道 Agent 操作，知識自然擴散的組織學習模型","Shopify AI Toolkit（MIT）：MCP + Cursor + Claude Code 整合，GitHub 開源","uv：Python 版本管理 + venv + 套件安裝統一工具，比 pyenv + pip 快 10-100x","DevSecOps 2026：安全掃描內嵌 CI/CD 管道，IaC 掃描 + SAST + container scan"]}},"sources":[{"title":"CSS Anchor Positioning Guide | CSS-Tricks","url":"https://css-tricks.com/css-anchor-positioning-guide/"},{"title":"CSS Anchor Positioning: The End of JavaScript Tooltip Libraries","url":"https://pockit.tools/blog/css-anchor-positioning-api-complete-guide/"},{"title":"Anchor positioning | web.dev","url":"https://web.dev/learn/css/anchor-positioning"},{"title":"Python 3.14 Free-Threading True Parallelism Without the GIL | dev.to","url":"https://dev.to/edgar_montano/python-314-free-threading-true-parallelism-without-the-gil-a12"},{"title":"Python in 2026: Free-Threading and UV Change Everything | Medium","url":"https://medium.com/@kenancan.dev/python-in-2026-free-threading-and-uv-change-everything-548c19b170aa"},{"title":"Python support for free threading — Python 3.14 docs","url":"https://docs.python.org/3/howto/free-threading-python.html"},{"title":"Learning on the Shop floor | Simon Willison","url":"https://simonwillison.net/2026/May/11/learning-on-the-shop-floor/"},{"title":"Shopify: Building a Public AI Agent Workspace for Organizational Learning","url":"https://www.zenml.io/llmops-database/building-a-public-ai-agent-workspace-for-organizational-learning"},{"title":"The Best Open Source and Open-Weight LLM Models to Run Locally in 2026 | Hugging Face","url":"https://huggingface.co/blog/daya-shankar/open-source-llm-models-to-run-locally"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
