name: Write Journal Entry (2026-05-16 20:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260516-2000.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-05-16","session_label":"20:00","tech_content":"**MCP 與 Agent Skills — AI 原生系統的兩種互補架構**\n\n在 2026 年構建 AI 原生系統時，工程師常混淆 MCP（Model Context Protocol）與 Agent Skills 的定位。MCP 是一種 Client-Server 通訊協定，透過 JSON-RPC 讓多個 Agent 得以標準化地連接後端系統（資料庫、API、檔案系統），server 通常以獨立 process 或容器形式運行，解決的是「Agent 如何接觸外部世界」的問題。相對地，Agent Skills 只是一個資料夾加上 SKILL.md 文件，定義 agent 在特定情境下的行為指引，不需額外基礎設施，解決的是「Agent 接觸世界後應該做什麼」。最佳實踐是混合使用兩者：以 MCP 提供 agent 的神經系統（感知與行動），以 Skills 提供 agent 的心智劇本（決策與知識）。這個架構分層讓平台工程師得以為 AI agent 建立可重用、可版本控制的行為模組，而不是將所有邏輯耦合在單一 prompt 或 tool definition 中。\n\n**Python 3.14 Free-Threading — GIL 移除後的真實平行運算**\n\nPython 3.14 透過 PEP 779 正式將 free-threaded build 從實驗性升格為官方支援，標誌著困擾 CPython 長達 30 年的 GIL（Global Interpreter Lock）限制進入歷史。新實作採用 per-object locking 與 biased reference counting 取代全域鎖，讓多執行緒的 CPU 密集型任務可實現真正平行執行，實測在 4 核心機器上可達 2-4 倍效能提升。需注意：純 Python 程式碼立即受益，但以 C extension 撰寫的套件需以新 ABI 重新編譯；單執行緒腳本則因 atomic ops 而有 5-10% 的效能退化。對於 ETL 資料管線、高併發 API server、以及多核心 CLI 工具開發者，這是 2026 年升級 Python 環境最值得測試的新特性。\n\n**CSS Anchor Positioning — 告別 JavaScript 定位函式庫的時代**\n\nCSS Anchor Positioning 在 Interop 2026 計畫中被列為重點改善項目，已於 2026 年初成為 Baseline Newly Available，代表 Chrome、Firefox、Safari 均已穩定支援。這個 CSS 原生 API 允許開發者以宣告式語法（anchor-name、position-anchor、anchor() 函數）將 tooltip、popover、dropdown 等浮動元件定位到任意錨點元素，完全不需要 Floating UI 或 Popper.js 等 JavaScript 定位函式庫。特別實用的是 position-try-fallbacks 機制：當定位元件超出視窗邊界時，CSS 引擎會自動依序嘗試備用位置策略，不再需要手動計算碰撞偵測邏輯。對於需要維護大量互動式 UI 元件的前端工程師，這是 2026 年減少 JavaScript bundle 體積與降低定位邏輯複雜度的最佳工具之一。","tech_application":"**① 使用 uv 啟用 Python 3.14 Free-Threading 並驗證 GIL 停用**\n\n適合 Python 後端工程師或資料工程師，在需要處理 CPU 密集型並行工作負載（如資料管線、影像處理批次作業）時使用。透過 uv 可快速切換到 free-threaded build 並驗證環境正確性。\n\n```bash\n# 安裝 uv（如尚未安裝）\ncurl -LsSf https://astral.sh/uv/install.sh | sh\n\n# 建立使用 Python 3.14 free-threaded build 的虛擬環境\nuv venv --python 3.14t .venv-ft\nsource .venv-ft/bin/activate\n\n# 驗證 GIL 是否已停用（預期輸出 False）\npython -c \"import sys; print(sys._is_gil_enabled())\"\n```\n\n```python\n# parallel_test.py\nimport threading\nimport time\n\ndef cpu_bound():\n    return sum(range(10_000_000))\n\nstart = time.time()\nworkers = [threading.Thread(target=cpu_bound) for _ in range(4)]\nfor w in workers:\n    w.start()\nfor w in workers:\n    w.join()\nprint(\"elapsed:\", round(time.time() - start, 2), \"seconds\")\n```\n\n```bash\npython parallel_test.py\n```\n\n**② 用純 CSS Anchor Positioning 實作 Tooltip**\n\n適合前端工程師，在需要為設計系統建立 tooltip 或 popover 元件時使用。以下範例以純 CSS 實現，由 CSS 引擎處理視窗碰撞偵測，無需引入任何 JavaScript 定位函式庫。\n\n```html\n<style>\n  .tooltip-anchor {\n    anchor-name: --my-anchor;\n  }\n  .tooltip {\n    position: absolute;\n    position-anchor: --my-anchor;\n    bottom: calc(anchor(top) + 8px);\n    left: anchor(center);\n    translate: -50% 0;\n    position-try-fallbacks: --below;\n  }\n  @position-try --below {\n    bottom: auto;\n    top: calc(anchor(bottom) + 8px);\n  }\n</style>\n<button class=\"tooltip-anchor\">Hover me</button>\n<div class=\"tooltip\" popover>這是一個純 CSS tooltip，支援自動邊界偵測</div>\n```\n\n定位完全由 CSS 引擎處理，包括視窗碰撞偵測與回退策略，無需引入任何 JavaScript 定位函式庫。","learning_analysis":{"AI / 機器學習":{"summary":"MCP 與 Agent Skills 的架構分層成為 2026 年 AI 原生應用的核心設計模式；Netflix 建立 Model Lifecycle Graph 以民主化內部 ML 工作流，展示大型企業如何系統性管理模型生命週期","items":["MCP 負責連接 Agent 與外部系統（資料庫、API），Skills 負責定義 Agent 的行為知識，兩者混合使用可建立可維護的 AI agent 架構","Netflix 的 Model Lifecycle Graph 追蹤模型從訓練到部署的完整依賴關係，讓非 ML 專家也能安全地更新模型","ByteByteGo EP213 詳細解析 MCP vs Skills 的五大維度差異：架構、執行環境、通訊協定、部署方式、適用場景"]},"雲端與基礎架構":{"summary":"Netflix 分享 ML Model Serving 的路由架構現狀，揭示大規模推論系統在延遲、吞吐量與成本之間的工程權衡；Python 3.14 free-threading 對雲端 CPU 密集型工作負載具有直接效益","items":["Netflix Model Serving 路由層需同時處理模型版本切換、A/B 測試流量分流、以及 canary deployment","Python 3.14 free-threaded build 讓雲端 CPU 密集型 Python 服務（如 ETL、影像處理）無需改寫即可獲得多核心平行加速","uv 工具鏈支援同時管理多個 Python 版本（含 free-threaded 變體），是雲端環境 Python 版本切換的推薦工具"]},"前端開發":{"summary":"CSS Anchor Positioning 在 Interop 2026 中成為 Baseline Newly Available，讓開發者得以用純 CSS 取代 JavaScript 定位函式庫，降低 bundle 體積並簡化 UI 元件邏輯","items":["anchor-name 與 position-anchor 屬性讓 CSS 元素之間建立定位關係，無需 getBoundingClientRect() 或 ResizeObserver","position-try-fallbacks 提供宣告式碰撞偵測回退策略，取代原先需要 JavaScript 計算的視窗邊界判斷邏輯","CSS contrast-color() 函數同樣在 2026 年成為 Baseline，可自動根據背景色選擇最高對比度的前景色，改善無障礙設計流程"]},"後端 / 系統設計":{"summary":"Python 3.14 free-threading 改變 CPU 密集型後端服務的並行架構設計，工程師可重新評估以往因 GIL 而採用多進程（multiprocessing）的設計決策","items":["free-threaded Python 讓 threading 模組可真正利用多核心，多進程架構的啟動開銷與記憶體複製成本得以消除","C extension 套件需以新 ABI 重新編譯，升級前需確認核心依賴（如 numpy、pandas、pydantic）的 free-threading 支援狀態","Django、Flask 等 WSGI 框架在 free-threaded 模式下可以 threaded=True 運行，在單進程中實現真正的並行請求處理"]},"開發者工具 / DevOps":{"summary":"uv 成為 Python 工具鏈管理的首選工具，支援快速切換 free-threaded build；MCP 成為 DevOps 平台工程連接 AI agent 與基礎設施系統的標準協定，技術選型時需與 Agent Skills 明確區分職責","items":["uv venv --python 3.14t 一行指令即可建立 free-threaded Python 虛擬環境，比手動編譯 CPython 省去大量設定時間","MCP server 以獨立 process 運行，可在 CI/CD pipeline 中作為 agent 連接 GitHub、Jira、Kubernetes 等工具的標準介面","Agent Skills（SKILL.md）適合在版本控制系統中管理團隊共用的 AI 工作指引，搭配 MCP 形成完整的 DevOps agent 架構"]}},"sources":[{"title":"EP213: MCP vs Skills, Clearly Explained — ByteByteGo","url":"https://blog.bytebytego.com/p/ep213-mcp-vs-skills-clearly-explained"},{"title":"Understanding MCP vs Agent Skills: Key Differences Explained","url":"https://greenido.dev/2026/05/13/mcp-vs-skills-two-very-different-ways-to-extend-agents/"},{"title":"Python 3.14 Free-Threading and Experimental JIT: GIL Removal in 2026","url":"https://blog.imseankim.com/python-3-14-free-threading-jit-compiler-gil-removal-2026/"},{"title":"Python in 2026: Free-Threading and UV Change Everything","url":"https://medium.com/@kenancan.dev/python-in-2026-free-threading-and-uv-change-everything-548c19b170aa"},{"title":"Interop 2026: Continuing to improve the web for developers","url":"https://web.dev/blog/interop-2026"},{"title":"CSS Anchor Positioning — web.dev Learn CSS","url":"https://web.dev/learn/css/anchor-positioning"},{"title":"Democratizing Machine Learning at Netflix: Building the Model Lifecycle Graph","url":"https://netflixtechblog.com/democratizing-machine-learning-at-netflix-building-the-model-lifecycle-graph-5cc6d5828bb1"},{"title":"State of Routing in Model Serving — Netflix TechBlog","url":"https://netflixtechblog.com/state-of-routing-in-model-serving-16e22fe18741"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
