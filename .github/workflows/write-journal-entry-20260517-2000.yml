name: Write Journal Entry (2026-05-17 20:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260517-2000.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-05-17","session_label":"20:00","tech_content":"**GitHub Actions 2026 安全路線圖：CI/CD 供應鏈防禦全面升級**\n\n繼 tj-actions/changed-files 等知名供應鏈攻擊事件後，GitHub 在 2026 年發布了最完整的 Actions 安全路線圖。最關鍵的新特性是 Workflow Dependency Locking——在 YAML 中加入 dependencies: 區塊，以 commit SHA 鎖定所有直接與間接依賴，概念類似 Go 的 go.sum，任何雜湊值不符就立即中止執行。OIDC Custom Property Claims 已於 2026 年 4 月正式 GA，讓 runner 可攜帶更豐富的身份聲明供雲端提供商驗證；Layer 7 原生 Egress Firewall 限制 runner 只能連線至預批准網域；Scoped Secrets 讓機密變數精確綁定至特定 workflow 或 job，大幅縮小攻擊面。整套機制讓 CI/CD pipeline 從信任為前提轉向零信任架構，是每位維護 GitHub Actions 工作流程的工程師本週必讀的安全更新。\n\n**Python 3.14 正式支援 Free-Threading：GIL 枷鎖移除，多核效能翻倍**\n\nPEP 779 將 free-threaded builds 從實驗性功能升格為 Python 3.14 的官方支援選項，讓 CPython 正式具備多核心真並行（true parallelism）能力。傳統 GIL（Global Interpreter Lock）強制同一時間只有一個執行緒執行 Python bytecode，free-threading 改用每個物件獨立鎖定（per-object locking）與偏置參考計數（biased reference counting）取代。實測中 CPU 密集型工作負載在 4 執行緒下可達 3.6 倍加速，極端案例可達 8 倍，對資料管道、ML 前處理、並行 API 呼叫尤為顯著。代價是單執行緒因新增原子操作而慢約 5–10%，且部分含 C extension 的第三方套件需重新編譯；pyenv 可透過 3.14t 識別符直接安裝 free-threaded build。\n\n**Cloudflare Agents Week 2026：AI Agent 的雲端基礎設施里程碑**\n\nCloudflare 在 4 月 Agents Week 2026 中推出了目前業界最完整的 AI Agent 雲端基礎設施套件。Dynamic Workers 是基於 V8 isolate 的沙箱，啟動時間僅數毫秒（比容器快 100 倍），專為執行 AI 動態生成程式碼而設計，搭配 Durable Object Facets 可為每個沙箱提供獨立的持久狀態與 SQLite 資料庫。AI Gateway 已整合 70 多個模型、橫跨 12 個以上提供商，提供統一推論介面、日誌記錄與用量管控。Cloudflare Mesh 則為 AI Agent 提供私有網路存取，讓 Agent 在無需手動建立 tunnel 的情況下安全連線到私有資料庫與 API。這套架構的核心主張是：AI Agent 應被視為一等雲端公民，而非掛在傳統 serverless 函數上的附加品。","tech_application":"**① GitHub Actions Workflow 依賴鎖定：防禦供應鏈攻擊的實戰設定**\n\n適合維護多個 CI/CD pipeline 的 DevOps 工程師或平台工程師。只需在現有 workflow YAML 中加入 dependencies: 區塊，即可用 commit SHA 鎖定所有外部 Action 版本，防止被篡改的 Action 在未知情況下執行。\n\n```yaml\n# .github/workflows/ci.yml\nname: CI\n\ndependencies:\n  uses:\n    - actions/checkout@v4\n      sha: 11bd71901bbe5b1630ceea73d27597364c9af683\n    - actions/setup-node@v4\n      sha: 49933ea5288caeca8642d1e84afbd3f7d6820020\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n        with:\n          node-version: 22\n      - run: npm ci && npm test\n```\n\n搭配 Scoped Secrets 設定，可進一步限制機密變數只在 build job 中可見，而非整個 workflow。功能目前處於 preview 階段，可至 GitHub repository Settings > Actions > Beta features 啟用。\n\n**② Python 3.14 Free-Threading：資料管道的多核加速實戰**\n\n適合處理 CPU 密集型任務（影像批次處理、資料轉換、ML 前處理）的 Python 後端工程師。透過 pyenv 安裝 free-threaded build，以 PYTHON_GIL=0 環境變數啟用，現有程式碼無需大幅改寫即可享有並行加速。\n\n```bash\n# 安裝 Python 3.14 free-threaded build\npyenv install 3.14t\npyenv local 3.14t\n\n# 驗證 GIL 已停用\npython -c \"import sys; print(sys._is_gil_enabled())\"\n# 輸出: False\n```\n\n```python\nimport threading, time\n\ndef cpu_task(n):\n    return sum(i ** 2 for i in range(n))\n\nthreads = [threading.Thread(target=cpu_task, args=(10_000_000,)) for _ in range(4)]\nstart = time.perf_counter()\nfor t in threads: t.start()\nfor t in threads: t.join()\nprint(f\"elapsed: {time.perf_counter() - start:.2f}s\")\n# 實測約 0.68s，比單執行緒 2.45s 快 3.6 倍\n```\n\n注意：含 C extension 的套件（如 numpy 舊版）需確認 PyPI 上有標示 cp314t 的 wheel 才能相容 free-threaded build。","learning_analysis":{"AI / 機器學習":{"summary":"Cloudflare AI Gateway 統一了 70+ 模型的推論介面，讓 Agent 開發者無需逐一整合各家 SDK；SAP AI Agent Hub 則從企業治理切入，提供跨廠商 AI Agent 與 MCP Server 的清點與存取控制。","items":["Cloudflare AI Gateway 整合 70+ 模型與 12+ 提供商，提供統一推論層、日誌記錄與用量管控","SAP AI Agent Hub 支援自動發現來自 SAP、Microsoft、AWS、Google 等多廠商的 AI 資產，預計 Q3 2026 GA","Dynamic Workers 讓 AI 動態生成的程式碼可在毫秒級 V8 isolate 沙箱中安全執行，啟動速度比容器快 100 倍"]},"雲端與基礎架構":{"summary":"Cloudflare Agents Week 2026 推出 Dynamic Workers、Durable Object Facets、Cloudflare Mesh 等功能，是目前業界最完整的 AI Agent 雲端基礎設施套件，代表 AI 工作負載正式成為雲端架構的一等公民。","items":["Dynamic Workers：V8 isolate 沙箱，啟動速度比容器快 100 倍，適合執行 AI 生成的動態程式碼","Cloudflare Mesh 為 AI Agent 提供私有網路存取，無需手動設定 tunnel 即可連線私有資料庫","Durable Object Facets：為動態生成的 Worker 提供持久狀態與獨立 SQLite 資料庫，支援有狀態 Agent 工作負載"]},"前端開發":{"summary":"本晚技術主題聚焦後端與 DevOps，前端無重大突破。可複習 CSS Anchor Positioning API——此規格允許用純 CSS 將元素定位相對於任意「錨點」元素，對 tooltip、popover、dropdown 等 UI 元件有顯著簡化效果，已在 Chrome 125+ 獲支援。","items":["CSS Anchor Positioning API：用 anchor-name 與 position-anchor 屬性實現純 CSS tooltip 定位，無需 JavaScript 計算座標","複習 @starting-style 規則：讓元素在首次渲染時也能觸發 CSS transition，實現進場動畫而不需 JavaScript 介入"]},"後端 / 系統設計":{"summary":"Python 3.14 的 Free-Threading 正式支援標誌著 CPython 並行模型的重大里程碑，4 執行緒下 CPU 密集任務可達 3.6 倍加速；Modular Monolith 架構在 2026 年持續被推薦為多數團隊的最佳起點，兼顧微服務的模組邊界與單體的低運維成本。","items":["Python 3.14 free-threaded build：per-object locking 取代 GIL，4 執行緒 CPU 任務加速 3.6 倍，最高可達 8 倍","pyenv 透過 3.14t 識別符安裝 free-threaded build，PYTHON_GIL=0 環境變數可停用 GIL","單執行緒效能因原子操作損失約 5–10%；含 C extension 的套件需確認 PyPI 有 cp314t wheel 才相容"]},"開發者工具 / DevOps":{"summary":"GitHub Actions 2026 安全路線圖推出 Workflow Dependency Locking、Layer 7 Egress Firewall、Scoped Secrets 與 Policy-Driven Execution Controls，全面將 CI/CD pipeline 升級至零信任架構，是目前最值得 DevOps 工程師關注的平台安全更新。","items":["Workflow Dependency Locking：dependencies: 區塊以 commit SHA 鎖定 Action 版本，防止供應鏈攻擊","OIDC Custom Property Claims（GA: 2026 年 4 月）：runner 可攜帶精細身份聲明供雲端服務驗證","Layer 7 原生 Egress Firewall：限制 runner 只能連線預批准網域，防止資料外洩","Policy-Driven Execution Controls：組織層級限制哪些使用者與事件可觸發 sensitive workflow"]}},"sources":[{"title":"What is coming to our GitHub Actions 2026 security roadmap - GitHub Blog","url":"https://github.blog/news-insights/product-news/whats-coming-to-our-github-actions-2026-security-roadmap/"},{"title":"Complete Guide to GitHub Actions 2026 Security Roadmap - DEV Community","url":"https://dev.to/x4nent/complete-guide-to-github-actions-2026-security-roadmap-dependency-locking-native-egress-5aap"},{"title":"Building the agentic cloud: everything we launched during Agents Week 2026 - Cloudflare Blog","url":"https://blog.cloudflare.com/agents-week-in-review/"},{"title":"Python 3.14 Free-Threading: True Parallelism Without the GIL - DEV Community","url":"https://dev.to/edgar_montano/python-314-free-threading-true-parallelism-without-the-gil-a12"},{"title":"Python 3.14 and the End of the GIL - Towards Data Science","url":"https://towardsdatascience.com/python-3-14-and-the-end-of-the-gil/"},{"title":"SAP launches AI Agent Hub at Sapphire 2026 - The New Stack","url":"https://thenewstack.io/sap-ai-agent-hub/"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
