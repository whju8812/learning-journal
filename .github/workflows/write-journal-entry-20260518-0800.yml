name: Write Journal Entry (2026-05-18 08:00)

on:
  push:
    paths:
      - '.github/workflows/write-journal-entry-20260518-0800.yml'
  workflow_dispatch:

jobs:
  write-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Write entry JSON
        run: |
          printf '%s' '{"entry_date":"2026-05-18","session_label":"08:00","tech_content":"**Netflix 模型生命週期圖：以知識圖譜解鎖企業 ML 民主化**\n\nNetflix 在 2026 年 5 月發表了「模型生命週期圖（Model Lifecycle Graph）」，由其新建的元資料服務（Metadata Service，MDS）驅動。當企業 ML 工程師在不同業務部門各自構建推薦模型、搜尋模型時，模型間的依賴關係形成黑盒，跨團隊複用幾乎不可能。MDS 以圖（Graph）結構索引所有 ML 相關實體——資料集、特徵、實驗、Pipeline、模型——並以實時方式攝入元資料，讓任何 ML 從業者都能問出「哪個實驗正在使用這個模型？」或「哪些模型共享這些特徵？」等跨域問題。這種設計將 ML 資產的可發現性、可理解性與可複用性系統化，是大型企業 ML 平台架構的重要參考案例。\n\n**Cloudflare Agents Week 2026：為 AI Agent 打造的雲端基礎設施棧**\n\nCloudflare 舉辦了 Agents Week 2026，密集推出 20 餘項針對 AI Agent 的基礎設施工具。最核心的是 Dynamic Workers：基於 V8 Isolate 的執行環境，能在毫秒級啟動並在安全沙盒中執行 AI 生成的程式碼，速度是傳統容器的 100 倍且成本大幅降低。同步推出的 Agent Memory 是託管記憶服務，讓 Agent 能跨 Session 持久化關鍵上下文，避免將海量歷史資料塞入 Context Window 造成的品質退化（Context Rot）。Artifacts 則提供分散式、版本化的 Git 相容文件系統，解決 Agent 執行任務過程中持久化程式碼與資料的痛點。這套組合讓開發者能在 Cloudflare 邊緣網路上構建真正具備記憶、計算與存儲能力的自主 Agent。\n\n**GitHub Actions 2026 安全路線圖：以依賴鎖定對抗供應鏈攻擊**\n\nGitHub 公布了 2026 年 Actions 安全路線圖，系統性回應近年供應鏈攻擊（如 tj-actions 事件）。最關鍵的新特性是 Workflow Dependency Locking：在 workflow YAML 的 dependencies 區塊以 commit SHA 鎖定所有直接與傳遞依賴，類似 Go 的 go.mod 加 go.sum 機制，任何雜湊值不符即終止執行。此外還有 Scoped Secrets（Secret 只對特定 Job 或 Step 可見）、Native Egress Firewall（第七層出口防火牆過濾 runner 的對外連線）以及 Actions Data Stream（執行遙測實時輸出到 S3 或 Azure Event Hub）。這四項功能合力大幅壓縮 CI/CD Pipeline 的攻擊面，是 DevSecOps 實踐的重要演進。","tech_application":"**① 用 GitHub Actions Dependency Locking 鎖定 CI/CD 供應鏈安全**\n\n適合維護 GitHub 開放或私有 Repository 的後端與 DevOps 工程師。GitHub Actions 2026 安全路線圖中的依賴鎖定功能進入 Public Preview 後，可使用 GitHub CLI 自動生成鎖定文件：\n\n```bash\n# 確認 GitHub CLI 版本\ngh --version\n\n# 為指定 workflow 生成依賴鎖定（CLI 自動解析所有 Action 的 commit SHA）\ngh actions lock-dependencies .github/workflows/ci.yml\n```\n\n執行後 CLI 會將 commit SHA 寫入 workflow 的 dependencies 區塊。之後任何依賴版本被篡改都會導致 hash mismatch，Pipeline 在第一步即終止，大幅降低供應鏈攻擊風險。建議先從關鍵部署 workflow 開始啟用，再逐步推廣至所有 CI 流程。\n\n**② 使用 Cloudflare Project Think（Agents SDK）快速構建具備持久記憶的 AI Agent**\n\n適合想在 Cloudflare Workers 上部署具備跨 Session 記憶與沙盒執行能力的 AI Agent 開發者。Project Think 整合了 Dynamic Workers 與 Agent Memory，開箱即用：\n\n```bash\n# 建立新的 Agent 專案\nnpm create cloudflare@latest my-agent -- --template agent\ncd my-agent\n\n# 本地開發預覽\nnpx wrangler dev\n```\n\n在 Agent 中啟用持久記憶：\n\n```typescript\nimport { AgentMemory } from \"@cloudflare/agents\";\n\nexport default {\n  async fetch(request: Request, env: Env): Promise<Response> {\n    const memory = new AgentMemory(env, \"session-123\");\n    await memory.store(\"last_action\", \"deployed_api\");\n    const last = await memory.recall(\"last_action\");\n    return Response.json({ recalled: last });\n  }\n};\n```\n\n部署後 Agent Memory 自動持久化跨請求的上下文，Dynamic Workers 負責隔離執行 LLM 生成的任意程式碼，避免影響主服務。","learning_analysis":{"AI / 機器學習":{"summary":"Netflix 推出模型生命週期圖（Model Lifecycle Graph），以知識圖譜架構索引企業內所有 ML 資產，解決大型組織中模型發現與複用的難題；Qwen3 成為 2026 年本地部署的首選開源模型族群。","items":["Netflix MDS 建構 ML 知識圖譜，實時攝入模型、特徵、實驗等元資料","跨域查詢能力：「哪個實驗在用這個模型？」等問題可立即回答，減少重複建模","Qwen3 系列成為開源本地 LLM 的事實標準推薦選項（Hugging Face 評選）","Agent-Native Memory（如 Memori）解決多 Session LLM 應用的持久化記憶問題"]},"雲端與基礎架構":{"summary":"Cloudflare Agents Week 2026 密集推出針對 AI Agent 的邊緣基礎設施，包括 Dynamic Workers 沙盒執行、Agent Memory 持久化、Artifacts 分散式文件系統與 Cloudflare Mesh 安全網路，構建完整的 Agent 雲端基礎設施棧。","items":["Dynamic Workers：V8 Isolate 沙盒執行 AI 生成程式碼，毫秒級啟動，速度是容器的 100 倍","Agent Memory：跨 Session 持久化上下文，避免 Context Rot 問題","Artifacts：分散式版本化文件系統，Git 相容，供 Agent 永久存儲程式碼與資料","Cloudflare Mesh：為 Agent 提供有範圍限制的私有網路存取，無需手動設置 Tunnel"]},"前端開發":{"summary":"Interop 2026 持續推進瀏覽器互操作性，Chrome 147、Firefox 150 相繼落地；前端性能優化重心從 LCP、CLS 轉向 INP（Interaction to Next Paint），< 200ms 成為 Core Web Vitals 的關鍵門檻。","items":["Interop 2026：Apple、Google、Microsoft、Mozilla 聯合推進跨瀏覽器功能一致性","Chrome 147 / Firefox 150 帶來新 Baseline 2026 特性，可放心用於生產環境","INP（Interaction to Next Paint）< 200ms 成為 Core Web Vitals 的關鍵性能門檻","React 性能優化：用 useRef 代替 useState 儲存不觸發渲染的值（計時器、DOM ref 等）"]},"後端 / 系統設計":{"summary":"模組化單體架構（Modular Monolith）在 2026 年持續受到推薦，以 80% 微服務收益換取 20% 的運維成本；BFF（Backend for Frontend）模式為不同前端客戶端提供專屬後端，是多平台應用的架構最佳實踐。","items":["模組化單體（Modular Monolith）：邊界清晰但單一部署，適合大多數成長期產品團隊","BFF 模式：每個前端（Web、Mobile、TV）獲得專屬後端，避免 API 過度通用化","Pub/Sub 模式：Redis Pub/Sub、Kafka、NATS 用於服務間非同步通訊","Netflix Druid 區間感知快取（Interval-Aware Caching）：10 兆行資料庫的查詢優化實踐"]},"開發者工具 / DevOps":{"summary":"GitHub Actions 2026 安全路線圖聚焦供應鏈防禦，推出 Dependency Locking、Scoped Secrets、Native Egress Firewall 與 Actions Data Stream 四大特性；GitHub Actions 仍以 33% 採用率領跑 CI/CD 工具市場。","items":["Workflow Dependency Locking：以 commit SHA 鎖定所有 Action 依賴，hash mismatch 終止執行","Scoped Secrets：Secret 僅對特定 Job/Step 可見，實踐最小權限原則","Native Egress Firewall（L7）：過濾 runner 的對外連線，防範資料外洩","Actions Data Stream：執行遙測實時輸出到 S3 / Azure Event Hub，提供完整稽核鏈"]}},"sources":[{"title":"Democratizing Machine Learning at Netflix: Building the Model Lifecycle Graph","url":"https://netflixtechblog.com/democratizing-machine-learning-at-netflix-building-the-model-lifecycle-graph-5cc6d5828bb1"},{"title":"Building the agentic cloud: everything we launched during Agents Week 2026","url":"https://blog.cloudflare.com/agents-week-in-review/"},{"title":"GitHub Actions 2026 Security Roadmap - The GitHub Blog","url":"https://github.blog/news-insights/product-news/whats-coming-to-our-github-actions-2026-security-roadmap/"},{"title":"Interop 2026: Continuing to improve the web for developers","url":"https://web.dev/blog/interop-2026"},{"title":"State of Routing in Model Serving - Netflix TechBlog","url":"https://netflixtechblog.com/state-of-routing-in-model-serving-16e22fe18741"},{"title":"Complete Guide to GitHub Actions 2026 Security Roadmap - DEV Community","url":"https://dev.to/x4nent/complete-guide-to-github-actions-2026-security-roadmap-dependency-locking-native-egress-5aap"}]}' > entry.json

      - name: Post entry to journal API
        env:
          JOURNAL_API_KEY: ${{ secrets.JOURNAL_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST             https://learning-journal.mariposa-lw.xyz/api/entries             -H "X-Journal-Key: $JOURNAL_API_KEY"             -H "Content-Type: application/json; charset=utf-8"             -d @entry.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: Entry written."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "SKIP: Entry already exists."
          else
            echo "ERROR: Unexpected status $HTTP_CODE"
            exit 1
          fi
