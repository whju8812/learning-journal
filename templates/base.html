<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Learning Journal{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/" aria-label="Learning Journal 首頁">
      <div class="logo-mark">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <rect width="32" height="32" rx="7" fill="var(--accent, #1E88E5)"/>
          <circle cx="16" cy="9" r="2.5" fill="#fff"/>
          <circle cx="9" cy="22" r="2.5" fill="#fff"/>
          <circle cx="23" cy="22" r="2.5" fill="#fff"/>
          <line x1="16" y1="11.5" x2="9" y2="19.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          <line x1="16" y1="11.5" x2="23" y2="19.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          <line x1="9" y1="22" x2="23" y2="22" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          <path d="M25 3 L25.7 5 L28 5.5 L25.7 6 L25 8 L24.3 6 L22 5.5 L24.3 5 Z" fill="#fff" opacity="0.8"/>
        </svg>
      </div>
      <span class="logo-text">Learning Journal{% block logo_sub %}{% endblock %}</span>
    </a>
    <div class="header-right">
      <nav class="header-nav" aria-label="頁面導覽">
        <a href="/" class="nav-link{% if request.path == '/' %} active{% endif %}">日誌</a>
        <a href="/about" class="nav-link{% if request.path == '/about' %} active{% endif %}">關於</a>
      </nav>
      {% block header_extras %}{% endblock %}
    </div>
  </div>
</header>

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='rainbow.js') }}"></script>
{% block scripts %}{% endblock %}

</body>
</html>
