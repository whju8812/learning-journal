<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Learning Journal{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/" aria-label="Learning Journal 首頁">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="9" y1="7" x2="15" y2="7"/>
          <line x1="9" y1="11" x2="15" y2="11"/>
        </svg>
      </div>
      <span class="logo-text">Learning Journal{% block logo_sub %}{% endblock %}</span>
    </a>
    <div class="header-right">
      <nav class="header-nav" aria-label="頁面導覽">
        <a href="/" class="nav-link{% if request.path == '/' %} active{% endif %}">日誌</a>
        <a href="/about" class="nav-link{% if request.path == '/about' %} active{% endif %}">關於</a>
      </nav>
      {% block header_extras %}{% endblock %}
    </div>
  </div>
</header>

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='rainbow.js') }}"></script>
{% block scripts %}{% endblock %}

</body>
</html>
