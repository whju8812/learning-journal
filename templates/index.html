<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>learning journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Base */
      --bg: #FFFFFF;
      --bg2: #F9FAFB;
      --bg3: #F3F4F6;
      --text: #1A1A2E;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;

      /* Accent — set by JS based on day of week */
      --accent: #1E88E5;
      --accent-light: #E3F2FD;
      --accent-hover: #1565C0;

      /* Semantic */
      --success: #43A047;
      --warning: #F9A825;
      --error: #E53935;

      /* Typography */
      --font-sans: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --text-hero: 20px;
      --text-h1: 22px;
      --text-h2: 18px;
      --text-h3: 16px;
      --text-body: 15px;
      --text-small: 13px;
      --text-mono: 14px;

      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --space-8: 48px;
      --space-10: 64px;

      /* Radius */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: var(--text-body);
      line-height: 1.7;
    }

    /* ─── Header ─── */
    header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 var(--space-6);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      text-decoration: none;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: color 200ms ease;
    }
    .logo-mark svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .logo-sub {
      font-size: var(--text-small);
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 2px;
    }
    .date-badge {
      font-size: var(--text-small);
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }



    /* ─── Main layout ─── */
    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-6);
    }


    /* ─── Journal layout ─── */
    .journal-layout {
      display: flex;
      gap: var(--space-6);
      min-height: 70vh;
    }

    /* ─── Date sidebar ─── */
    .date-sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      overflow-y: auto;
      max-height: calc(100vh - 200px);
      position: sticky;
      top: 120px;
    }
    .date-sidebar-title {
      font-size: var(--text-small);
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 var(--space-2) var(--space-3);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-3);
    }
    .date-chip {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-secondary);
      font-size: var(--text-small);
      transition: background-color 200ms ease, color 200ms ease;
      border-left: 3px solid transparent;
      margin-bottom: 2px;
      min-height: 44px;
    }
    .date-chip:hover {
      background: var(--bg3);
      color: var(--text);
    }
    .date-chip.active {
      background: var(--bg3);
      color: var(--text);
      font-weight: 500;
      border-left-color: var(--accent);
    }
    .date-chip.today {
      background: var(--accent-light);
      border-left-color: var(--accent);
    }
    .date-chip.today .today-badge {
      display: inline-flex;
    }
    .today-badge {
      display: none;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      margin-left: auto;
    }

    /* ─── Content area ─── */
    .journal-content {
      flex: 1;
      min-width: 0;
    }

    /* ─── Health banner ─── */
    .health-banner {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      font-size: var(--text-small);
    }
    .health-banner.success { 
      background: #E8F5E9;
      color: #2E7D32;
    }
    .health-banner.warning { 
      background: #FFF8E1;
      color: #F57F17;
    }
    .health-banner.error { 
      background: #FFEBEE;
      color: #C62828;
    }
    .health-dismiss {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: inherit;
      opacity: 0.6;
      padding: var(--space-1);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .health-dismiss:hover { opacity: 1; }

    /* ─── Entry header ─── */
    .entry-header {
      margin-bottom: var(--space-5);
    }
    .entry-date-title {
      font-size: var(--text-h1);
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .today-entry-badge {
      background: var(--accent);
      color: #fff;
      font-size: var(--text-small);
      font-weight: 500;
      padding: 2px 10px;
      border-radius: var(--radius-sm);
    }

    /* ─── Inner tabs ─── */
    .inner-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-5);
    }
    .inner-tab {
      padding: var(--space-3) var(--space-5);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      color: var(--text-secondary);
      font-size: var(--text-body);
      font-weight: 400;
      white-space: nowrap;
      transition: color 200ms ease, border-color 200ms ease, background-color 200ms ease;
      user-select: none;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .inner-tab:hover {
      color: var(--text);
      background: var(--bg3);
    }
    .inner-tab.active {
      color: var(--text);
      font-weight: 700;
      border-bottom-color: var(--accent);
    }

    /* ─── Inner sections ─── */
    .inner-section { display: none; }
    .inner-section.active { display: block; }

    /* ─── Tech content ─── */
    .tech-content {
      max-width: 700px;
    }
    .tech-content p {
      margin-bottom: var(--space-4);
      line-height: 1.7;
      color: var(--text);
    }
    .tech-content p:last-child {
      margin-bottom: 0;
    }

    /* ─── Learning direction sections ─── */
    .direction-section {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      overflow: hidden;
      transition: box-shadow 200ms ease;
    }
    .direction-section:hover {
      box-shadow: var(--shadow-sm);
    }
    .direction-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-5);
      cursor: pointer;
      user-select: none;
      min-height: 44px;
      transition: background-color 200ms ease;
    }
    .direction-header:hover {
      background: var(--bg2);
    }
    .direction-title {
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .direction-toggle {
      color: var(--text-muted);
      font-size: var(--text-body);
      transition: transform 150ms ease-out;
    }
    .direction-toggle.collapsed {
      transform: rotate(-90deg);
    }
    .direction-body {
      padding: 0 var(--space-5) var(--space-5);
    }
    .direction-body.collapsed {
      display: none;
    }
    .direction-summary {
      color: var(--text);
      line-height: 1.7;
      margin-bottom: var(--space-3);
    }
    .direction-items {
      list-style: none;
      padding: 0;
    }
    .direction-items li {
      color: var(--text-secondary);
      padding: var(--space-1) 0;
      padding-left: var(--space-4);
      position: relative;
      line-height: 1.6;
    }
    .direction-items li::before {
      content: '•';
      position: absolute;
      left: var(--space-2);
      color: var(--accent);
    }

    /* ─── Sources section ─── */
    .sources-section {
      margin-top: var(--space-6);
      border-top: 1px solid var(--border);
      padding-top: var(--space-4);
    }
    .sources-toggle {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      cursor: pointer;
      color: var(--text-muted);
      font-size: var(--text-small);
      user-select: none;
      padding: var(--space-2) 0;
      min-height: 44px;
    }
    .sources-toggle:hover {
      color: var(--text-secondary);
    }
    .sources-toggle-icon {
      transition: transform 150ms ease-out;
    }
    .sources-toggle-icon.expanded {
      transform: rotate(90deg);
    }
    .sources-list {
      display: none;
      padding: var(--space-3) 0;
    }
    .sources-list.expanded {
      display: block;
    }
    .source-link {
      display: block;
      padding: var(--space-2) 0;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: var(--text-small);
      line-height: 1.5;
      transition: color 200ms ease;
    }
    .source-link:hover {
      color: var(--accent);
    }
    .source-link span {
      color: var(--text-muted);
      margin-left: var(--space-2);
    }

    /* ─── Empty state ─── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-10) var(--space-6);
      min-height: 50vh;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: var(--space-5);
      color: var(--accent);
    }
    .empty-title {
      font-size: var(--text-h1);
      font-weight: 700;
      color: var(--text);
      margin-bottom: var(--space-3);
    }
    .empty-desc {
      color: var(--text-muted);
      font-size: var(--text-body);
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: var(--space-6);
    }
    .empty-cta {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-5);
      font-size: var(--text-body);
      font-family: var(--font-sans);
      font-weight: 500;
      cursor: pointer;
      transition: background-color 200ms ease;
      min-height: 44px;
    }
    .empty-cta:hover {
      background: var(--accent-hover);
    }

    /* ─── Loading shimmer ─── */
    .shimmer {
      background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .shimmer-line {
      height: 16px;
      margin-bottom: var(--space-3);
    }
    .shimmer-line.short { width: 60%; }
    .shimmer-line.medium { width: 80%; }
    .shimmer-line.long { width: 100%; }
    .shimmer-chip {
      height: 44px;
      margin-bottom: 4px;
      border-radius: var(--radius-md);
    }
    .shimmer-card {
      height: 100px;
      margin-bottom: var(--space-4);
      border-radius: var(--radius-md);
    }

    /* ─── Error state ─── */
    .error-state {
      padding: var(--space-6);
      text-align: center;
    }
    .error-icon {
      font-size: 32px;
      color: var(--error);
      margin-bottom: var(--space-3);
    }
    .error-text {
      color: var(--error);
      font-size: var(--text-body);
      margin-bottom: var(--space-4);
    }
    .retry-btn {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-5);
      font-size: var(--text-body);
      font-family: var(--font-sans);
      cursor: pointer;
      transition: background-color 200ms ease;
      min-height: 44px;
    }
    .retry-btn:hover {
      background: var(--border);
    }

    /* ─── Spinner (for accent-colored loading) ─── */
    .accent-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Mobile date strip ─── */
    .date-strip {
      display: none;
      overflow-x: auto;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      -webkit-overflow-scrolling: touch;
    }
    .date-strip .date-pill {
      flex-shrink: 0;
      padding: var(--space-2) var(--space-3);
      border-radius: 20px;
      font-size: var(--text-small);
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid transparent;
      transition: all 200ms ease;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .date-strip .date-pill.active {
      border-bottom: 2px solid var(--accent);
      color: var(--text);
      font-weight: 500;
    }
    .date-strip .date-pill.today {
      color: var(--accent);
      font-weight: 700;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .main-container { padding: var(--space-4); }
      .header-inner { padding: 0 var(--space-4); }
      .date-sidebar { width: 180px; }
    }

    @media (max-width: 480px) {
      .date-sidebar { display: none; }
      .date-strip { display: flex; }
      .journal-layout { flex-direction: column; gap: 0; }
      .main-container { padding: var(--space-3); }
      .header-inner { padding: 0 var(--space-3); height: 48px; }
      .entry-date-title { font-size: var(--text-h2); }
      .logo-sub { display: none; }
    }

    /* ─── Reduced motion ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0ms !important;
        transition-duration: 0ms !important;
      }
    }

    /* ─── Focus ─── */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ─── Section header (reuse from existing) ─── */
    .section-header {
      margin-bottom: var(--space-5);
    }
    .section-title {
      font-size: var(--text-h1);
      font-weight: 700;
      margin-bottom: var(--space-1);
    }
    .section-sub {
      color: var(--text-secondary);
      font-size: var(--text-small);
    }

    /* ─── Multi-session display ─── */
    .session-block {
      margin-bottom: var(--space-5);
    }
    .session-time-label {
      font-size: var(--text-small);
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: var(--space-3);
      padding: 2px var(--space-3);
      background: var(--bg2);
      border-radius: var(--radius-sm);
      display: inline-block;
      border: 1px solid var(--border);
    }
    .session-divider {
      border: none;
      border-top: 1px dashed var(--border);
      margin: var(--space-5) 0;
    }
    .session-count-note {
      font-size: var(--text-small);
      color: var(--text-muted);
      margin-top: var(--space-2);
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/" aria-label="Learning Journal 首頁">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="9" y1="7" x2="15" y2="7"/>
          <line x1="9" y1="11" x2="15" y2="11"/>
        </svg>
      </div>
      <span class="logo-text">Learning Journal<span class="logo-sub"> / 技術學習日誌</span></span>
    </a>
    <div class="date-badge" id="dateDisplay"></div>
  </div>
</header>



<div class="main-container">

  <!-- ── 學習日誌 ── -->
  <section id="tab-journal">

    <!-- Mobile date strip -->
    <div class="date-strip" role="tablist" aria-label="日期導覽（行動裝置）" id="mobileStrip"></div>

    <!-- Journal layout: sidebar + content -->
    <div class="journal-layout">

      <!-- Date sidebar -->
      <aside class="date-sidebar" role="navigation" aria-label="日期導覽" id="dateSidebar"> 
        <div id="dateList"></div>
      </aside>

      <!-- Content area -->
      <div class="journal-content" role="main" id="journalContent">
        <!-- Populated by JS -->
      </div>

    </div>
  </section>

</div>

<script>
// ─── Rainbow Day System ───
const RAINBOW = [
  { accent: '#8E24AA', light: '#F3E5F5', hover: '#6A1B9A' },
  { accent: '#E53935', light: '#FFEBEE', hover: '#C62828' },
  { accent: '#F4511E', light: '#FBE9E7', hover: '#D84315' },
  { accent: '#F9A825', light: '#FFF8E1', hover: '#F57F17' },
  { accent: '#43A047', light: '#E8F5E9', hover: '#2E7D32' },
  { accent: '#1E88E5', light: '#E3F2FD', hover: '#1565C0' },
  { accent: '#3949AB', light: '#E8EAF6', hover: '#283593' },
];
const DAY_NAMES = ['日', '一', '二', '三', '四', '五', '六'];

(function applyDayColor() {
  const c = RAINBOW[new Date().getDay()];
  document.documentElement.style.setProperty('--accent', c.accent);
  document.documentElement.style.setProperty('--accent-light', c.light);
  document.documentElement.style.setProperty('--accent-hover', c.hover);
})();

const now = new Date();
document.getElementById('dateDisplay').textContent =
  `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${DAY_NAMES[now.getDay()]})`;

// ─── Constants ───
const DIRECTION_ICONS = {
  'AI / 機器學習': '🤖',
  '雲端與基礎架構': '☁️',
  '前端開發': '🎨',
  '後端 / 系統設計': '⚙️',
  '開發者工具 / DevOps': '🔧',
};
const DIRECTIONS_ORDER = ['AI / 機器學習', '雲端與基礎架構', '前端開發', '後端 / 系統設計', '開發者工具 / DevOps'];

// ─── State ───
let currentDate = null;
let currentSessions = [];   // [{id, session_label, tech_content, learning_analysis, sources, created_at}]
let allDates = [];           // [{entry_date, created_at}]
let healthData = null;
let healthDismissed = false;
let currentInnerTab = 'tech';

// ─── Utils ───
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function todayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function isToday(dateStr) { return dateStr === todayStr(); }

function formatDateFull(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 技術日誌`;
}

function formatDateChip(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${DAY_NAMES[d.getDay()]})`;
}

// ─── API calls ───
async function apiFetch(path) {
  const res = await fetch(path);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw Object.assign(new Error(err.error || res.statusText), { status: res.status });
  }
  return res.json();
}

// ─── Init ───
async function initJournal() {
  showLoadingState();
  try {
    [healthData, allDates] = await Promise.all([
      fetch('/api/entries/health').then(r => r.json()).catch(() => null),
      apiFetch('/api/entries').catch(() => []),
    ]);

    if (!allDates || allDates.length === 0) {
      renderDateSidebarEmpty();
      document.getElementById('journalContent').innerHTML = renderEmptyState();
      return;
    }

    currentDate = allDates[0].entry_date;
    renderDateSidebar();
    await loadEntry(currentDate);
  } catch (e) {
    document.getElementById('journalContent').innerHTML = renderErrorState(initJournal);
  }
}

async function loadEntry(dateStr) {
  currentDate = dateStr;
  renderDateSidebar();
  document.getElementById('journalContent').innerHTML =
    '<div style="padding:var(--space-8);text-align:center;"><div class="accent-spinner"></div></div>';
  try {
    currentSessions = await apiFetch(`/api/entries/${dateStr}`);
    renderEntry();
  } catch (e) {
    if (e.status === 404) {
      document.getElementById('journalContent').innerHTML = renderEmptyState();
    } else {
      document.getElementById('journalContent').innerHTML = renderErrorState(() => loadEntry(dateStr));
    }
  }
}

function selectDate(dateStr) {
  if (dateStr === currentDate && currentSessions.length > 0) return;
  loadEntry(dateStr);
}

// ─── Date sidebar ───
function renderDateSidebarEmpty() {
  document.getElementById('dateList').innerHTML =
    '<div style="color:var(--text-muted);font-size:var(--text-small);padding:var(--space-3);">尚無日誌</div>';
  document.getElementById('mobileStrip').innerHTML = '';
}

function renderDateSidebar() {
  const list = document.getElementById('dateList');
  const strip = document.getElementById('mobileStrip');
  list.innerHTML = '';
  strip.innerHTML = '';

  allDates.forEach(entry => {
    const today = isToday(entry.entry_date);
    const active = entry.entry_date === currentDate;

    const chip = document.createElement('div');
    chip.className = 'date-chip' + (active ? ' active' : '') + (today ? ' today' : '');
    chip.setAttribute('role', 'tab');
    chip.setAttribute('tabindex', '0');
    chip.setAttribute('aria-selected', active ? 'true' : 'false');
    chip.innerHTML = `${today ? '✦ ' : ''}${escHtml(formatDateChip(entry.entry_date))}<span class="today-badge">今天</span>`;
    chip.onclick = () => selectDate(entry.entry_date);
    chip.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectDate(entry.entry_date); } };
    list.appendChild(chip);

    const pill = document.createElement('div');
    pill.className = 'date-pill' + (active ? ' active' : '') + (today ? ' today' : '');
    pill.setAttribute('role', 'tab');
    pill.setAttribute('tabindex', '0');
    pill.textContent = (today ? '✦ ' : '') + formatDateChip(entry.entry_date);
    pill.onclick = () => selectDate(entry.entry_date);
    strip.appendChild(pill);
  });
}

// ─── Health banner ───
function renderHealthBanner() {
  if (healthDismissed || !healthData) return '';
  const { last_entry_date, last_session_label, days_since_last_entry, is_overdue } = healthData;

  if (!last_entry_date) {
    return `<div class="health-banner warning">
      <span>⚠ 尚無任何日誌 — Claude Desktop 排程尚未執行</span>
      <button class="health-dismiss" onclick="dismissHealth()" aria-label="關閉">×</button>
    </div>`;
  }
  if (!is_overdue) {
    return `<div class="health-banner success">
      <span>▎ 上次更新：${escHtml(last_entry_date)} ${escHtml(last_session_label || '')} — 一切正常 ✓</span>
      <button class="health-dismiss" onclick="dismissHealth()" aria-label="關閉">×</button>
    </div>`;
  }
  const daysText = days_since_last_entry > 1 ? `${days_since_last_entry} 天前` : '昨天';
  return `<div class="health-banner warning">
    <span>⚠ 上次更新：${escHtml(last_entry_date)} ${escHtml(last_session_label || '')}（${daysText}）— Claude Desktop 可能未正常執行</span>
    <button class="health-dismiss" onclick="dismissHealth()" aria-label="關閉">×</button>
  </div>`;
}

function dismissHealth() {
  healthDismissed = true;
  const banner = document.querySelector('.health-banner');
  if (banner) banner.remove();
}

// ─── Entry rendering ───
function renderEntry() {
  const content = document.getElementById('journalContent');
  if (!currentSessions || currentSessions.length === 0) {
    content.innerHTML = renderEmptyState();
    return;
  }

  const today = isToday(currentDate);
  const multi = currentSessions.length > 1;

  // Tech content: all sessions in order, with time labels if multiple
  const techHtml = currentSessions.map((s, i) => {
    const paras = s.tech_content.split('\n\n')
      .map(p => `<p>${escHtml(p)}</p>`).join('');
    if (!multi) return `<div class="tech-content">${paras}</div>`;
    return `
      <div class="session-block">
        <span class="session-time-label">${escHtml(s.session_label)}</span>
        <div class="tech-content">${paras}</div>
      </div>
      ${i < currentSessions.length - 1 ? '<div class="session-divider"></div>' : ''}
    `;
  }).join('');

  // Learning analysis: use last session (most recent data)
  const lastSession = currentSessions[currentSessions.length - 1];

  // Sources: all sessions combined, deduplicated by URL
  const seenUrls = new Set();
  const allSources = currentSessions.flatMap(s => s.sources || []).filter(s => {
    if (seenUrls.has(s.url)) return false;
    seenUrls.add(s.url);
    return true;
  });

  content.innerHTML = `
    ${renderHealthBanner()}
    <div class="entry-header">
      <div class="entry-date-title">
        ${formatDateFull(currentDate)}
        ${today ? '<span class="today-entry-badge">🆕 今日日誌</span>' : ''}
      </div>
      ${multi ? `<div class="session-count-note">共 ${currentSessions.length} 個 session（${currentSessions.map(s => escHtml(s.session_label)).join('、')}）</div>` : ''}
    </div>
    <div class="inner-tabs" role="tablist" aria-label="日誌內容切換">
      <div class="inner-tab ${currentInnerTab === 'tech' ? 'active' : ''}" role="tab" tabindex="0" aria-selected="${currentInnerTab === 'tech'}" onclick="switchInnerTab('tech')">技術內容</div>
      <div class="inner-tab ${currentInnerTab === 'analysis' ? 'active' : ''}" role="tab" tabindex="0" aria-selected="${currentInnerTab === 'analysis'}" onclick="switchInnerTab('analysis')">學習方向分析</div>
    </div>
    <div id="inner-tech" class="inner-section ${currentInnerTab === 'tech' ? 'active' : ''}" role="tabpanel">
      ${techHtml}
    </div>
    <div id="inner-analysis" class="inner-section ${currentInnerTab === 'analysis' ? 'active' : ''}" role="tabpanel">
      ${renderDirections(lastSession.learning_analysis)}
    </div>
    ${renderSources(allSources)}
  `;
}

function switchInnerTab(tab) {
  currentInnerTab = tab;
  document.querySelectorAll('.inner-tab').forEach((t, i) => {
    const isActive = (i === 0 && tab === 'tech') || (i === 1 && tab === 'analysis');
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', String(isActive));
  });
  document.querySelectorAll('.inner-section').forEach(s => s.classList.remove('active'));
  document.getElementById('inner-' + tab).classList.add('active');
}

function renderDirections(analysis) {
  return DIRECTIONS_ORDER.map(dir => {
    const data = analysis && analysis[dir];
    if (!data) return '';
    const icon = DIRECTION_ICONS[dir] || '📌';
    const hasItems = data.items && data.items.length > 0;
    return `
      <div class="direction-section">
        <div class="direction-header" onclick="toggleDirection(this)" aria-expanded="true">
          <div class="direction-title">${icon} ${escHtml(dir)}</div>
          <span class="direction-toggle">▼</span>
        </div>
        <div class="direction-body">
          <p class="direction-summary">${escHtml(data.summary)}</p>
          ${hasItems ? `<ul class="direction-items">${data.items.map(item => `<li>${escHtml(item)}</li>`).join('')}</ul>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleDirection(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.direction-toggle');
  const wasExpanded = !body.classList.contains('collapsed');
  body.classList.toggle('collapsed');
  toggle.classList.toggle('collapsed');
  header.setAttribute('aria-expanded', String(!wasExpanded));
}

function renderSources(sources) {
  if (!sources || sources.length === 0) return '';
  return `
    <div class="sources-section">
      <div class="sources-toggle" onclick="toggleSources()">
        <span class="sources-toggle-icon" id="sourcesIcon">▶</span>
        📎 參考來源 (${sources.length})
      </div>
      <div class="sources-list" id="sourcesList">
        ${sources.map(s => `<a class="source-link" href="${escHtml(s.url)}" target="_blank" rel="noopener noreferrer">${escHtml(s.title)} <span>↗</span></a>`).join('')}
      </div>
    </div>
  `;
}

function toggleSources() {
  document.getElementById('sourcesList').classList.toggle('expanded');
  document.getElementById('sourcesIcon').classList.toggle('expanded');
}

// ─── Static states ───
function renderEmptyState() {
  return `
    <div class="empty-state">
      <div class="empty-icon">📖</div>
      <div class="empty-title">學習日誌即將開始</div>
      <div class="empty-desc">
        Claude 每日自動研究軟體技術趨勢，撰寫你的專屬學習日誌。<br>
        第一篇日誌將在排程執行後自動產生。
      </div>
      <button class="empty-cta" onclick="location.reload()">🔄 重新整理 →</button>
    </div>
  `;
}

function renderErrorState(retryFn) {
  window._retryFn = retryFn;
  return `
    <div class="error-state">
      <div class="error-icon">⚠</div>
      <div class="error-text">載入失敗，請稍後再試</div>
      <button class="retry-btn" onclick="window._retryFn && window._retryFn()">重試</button>
    </div>
  `;
}

function showLoadingState() {
  document.getElementById('dateList').innerHTML = `
    <div class="shimmer shimmer-chip"></div>
    <div class="shimmer shimmer-chip"></div>
    <div class="shimmer shimmer-chip"></div>
  `;
  document.getElementById('journalContent').innerHTML = `
    <div style="flex:1;">
      <div class="shimmer shimmer-line long"></div>
      <div class="shimmer shimmer-line medium"></div>
      <div class="shimmer shimmer-line short"></div>
      <div style="margin-top:var(--space-6);">
        <div class="shimmer shimmer-card"></div>
        <div class="shimmer shimmer-card"></div>
        <div class="shimmer shimmer-card"></div>
      </div>
    </div>
  `;
}

// ─── Init ───
initJournal();
</script>

</body>
</html>
