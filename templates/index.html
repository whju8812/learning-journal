{% extends "base.html" %}

{% block title %}日誌 — Learning Journal{% endblock %}

{% block logo_sub %}<span class="logo-sub"> / 技術學習日誌</span>{% endblock %}

{% block header_extras %}<div class="date-badge" id="dateDisplay"></div>{% endblock %}

{% block content %}
<div class="main-container">
  <section id="tab-journal">

    <div class="date-strip" role="tablist" aria-label="日期導覽（行動裝置）" id="mobileStrip"></div>

    <div class="journal-layout">
      <aside class="date-sidebar" role="navigation" aria-label="日期導覽">
        <div class="sidebar-search">
          <input
            type="search"
            id="searchInput"
            class="sidebar-search-input"
            placeholder="搜尋關鍵字…"
            aria-label="搜尋日誌關鍵字"
            autocomplete="off"
          />
          <button
            type="button"
            id="searchClear"
            class="sidebar-search-clear"
            aria-label="清除搜尋"
            hidden
          >×</button>
        </div>
        <div id="dateList"></div>
        <div id="searchResults" class="search-results" hidden></div>
      </aside>
      <div class="journal-content" role="main" id="journalContent"></div>
    </div>

  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='journal.js') }}"></script>
{% endblock %}
