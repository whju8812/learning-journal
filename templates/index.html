{% extends "base.html" %}

{% block title %}學習日誌{% endblock %}

{% block logo_sub %}<span class="logo-sub"> / 技術學習日誌</span>{% endblock %}

{% block header_extras %}<div class="date-badge" id="dateDisplay"></div>{% endblock %}

{% block content %}
<div class="main-container">
  <section id="tab-journal">

    <div class="date-strip" role="tablist" aria-label="日期導覽（行動裝置）" id="mobileStrip"></div>

    <div class="journal-layout">
      <aside class="date-sidebar" role="navigation" aria-label="日期導覽">
        <div id="dateList"></div>
      </aside>
      <div class="journal-content" role="main" id="journalContent"></div>
    </div>

  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='journal.js') }}"></script>
{% endblock %}
